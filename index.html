
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sopa Logos</title>
    <style>
        * { touch-action: none; user-select: none; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; background: #f0f2f5; height: 100vh; 
            display: flex; flex-direction: column; overflow: hidden;
        }
        
        /* CABECERA */
        .header { 
            background: #2e7d32; color: white; padding: 12px; 
            font-weight: bold; text-align: center; flex-shrink: 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        /* TABLERO (OCUPA ESPACIO FIJO) */
        #game-board { 
            background: white; padding: 10px; display: flex; 
            justify-content: center; flex-shrink: 0;
        }
        #grid { 
            display: grid; grid-template-columns: repeat(15, 1fr); 
            width: 95vw; max-width: 380px; aspect-ratio: 1/1;
            background: #bdc3c7; gap: 1px; border: 3px solid #2e7d32;
        }
        .cell { 
            background: white; display: flex; align-items: center; 
            justify-content: center; font-weight: bold; font-size: 13px; color: #2c3e50; 
        }
        .sel { background: #f1c40f !important; }
        .found { background: #27ae60 !important; color: white !important; }

        /* LISTA DE PALABRAS (OCUPA EL RESTO DE LA PANTALLA) */
        #footer-area { 
            flex-grow: 1; overflow-y: auto; background: #34495e; 
            padding: 15px; border-top: 5px solid #2e7d32;
            touch-action: pan-y; /* Permite scroll vertical */
        }
        .instruction { color: #ecf0f1; font-size: 11px; text-align: center; margin-bottom: 10px; opacity: 0.8; }
        #word-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; }
        .word-item { 
            padding: 5px 12px; background: #ecf0f1; border-radius: 20px; 
            font-size: 12px; color: #2c3e50; font-weight: bold; border: 2px solid transparent;
        }
        /* ESTILO PARA CUANDO SE ENCUENTRAN */
        .word-found { 
            background: #27ae60 !important; 
            color: white !important; 
            text-decoration: line-through;
            border-color: #ffffff;
            opacity: 0.7;
        }

        #victory-screen { 
            display: none; position: fixed; inset: 0; background: white; 
            z-index: 1000; flex-direction: column; align-items: center; justify-content: center; text-align: center;
        }
        .btn-next { background: #2e7d32; color: white; padding: 15px 40px; border-radius: 30px; border: none; font-weight: bold; margin-top: 20px; font-size: 18px; }
    </style>
</head>
<body>
    <div class="header">LIBRERÍA LOGOS - Kennedy Central</div>

    <div id="game-board">
        <div id="grid"></div>
    </div>

    <div id="footer-area">
        <div class="instruction">PALABRAS A ENCONTRAR (DESLIZA PARA VER TODAS):</div>
        <div id="word-list"></div>
    </div>

    <div id="victory-screen">
        <h1 style="color: #2e7d32;">¡EXCELENTE TRABAJO!</h1>
        <div style="padding: 20px; background: #f9f9f9; border-radius: 10px; margin: 10px; border: 1px solid #ddd;">
            <p>Sopa completada con éxito.</p>
            <p><b>Librería Logos</b><br>Calle 35C Sur No 78A-18<br>Bogotá, Colombia</p>
        </div>
        <button class="btn-next" onclick="initGame()">JUGAR OTRA VEZ</button>
    </div>

    <script>
        const pool = [];
        let wordsPos = {}; let foundCount = 0; let activeCoords = []; let isSelecting = false;
        const TAMANO = 15;

        function initGame() {
            document.getElementById('victory-screen').style.display = 'none';
            document.getElementById('grid').innerHTML = '';
            document.getElementById('word-list').innerHTML = '';
            wordsPos = {}; foundCount = 0;

            const seleccionadas = pool.sort(() => 0.5 - Math.random()).slice(0, 10);

            let matriz = Array(TAMANO).fill().map(() => Array(TAMANO).fill(''));
            seleccionadas.forEach(palabra => {
                let colocada = false;
                for(let i=0; i<30; i++) {
                    if(colocada) break;
                    let dir = ['H','V','D'][Math.floor(Math.random()*3)];
                    let f = Math.floor(Math.random()*TAMANO);
                    let c = Math.floor(Math.random()*TAMANO);
                    if(dir==='H' && c+palabra.length > TAMANO) continue;
                    if(dir==='V' && f+palabra.length > TAMANO) continue;
                    if(dir==='D' && (f+palabra.length > TAMANO || c+palabra.length > TAMANO)) continue;
                    
                    let coords = []; let puede = true;
                    for(let j=0; j<palabra.length; j++) {
                        let nf = f + (dir==='V' || dir==='D' ? j : 0);
                        let nc = c + (dir==='H' || dir==='D' ? j : 0);
                        if(matriz[nf][nc] !== '' && matriz[nf][nc] !== palabra[j]) { puede = false; break; }
                        coords.push(nf + '-' + nc);
                    }
                    if(puede) {
                        coords.forEach((co, idx) => { matriz[co.split('-')[0]][co.split('-')[1]] = palabra[idx]; });
                        wordsPos[palabra] = coords; colocada = true;
                    }
                }
            });

            const gridDiv = document.getElementById('grid');
            matriz.forEach((fila, r) => fila.forEach((char, c) => {
                const cell = document.createElement('div');
                cell.className = 'cell'; cell.textContent = char || String.fromCharCode(65 + Math.floor(Math.random()*26));
                cell.dataset.pos = r + '-' + c;
                gridDiv.appendChild(cell);
            }));

            const listDiv = document.getElementById('word-list');
            Object.keys(wordsPos).forEach(w => {
                const span = document.createElement('span');
                span.className = 'word-item'; span.id = 'w-' + w; span.textContent = w;
                listDiv.appendChild(span);
            });
        }

        function handleMove(e) {
            if (!isSelecting) return;
            const t = e.touches ? e.touches[0] : e;
            const el = document.elementFromPoint(t.clientX, t.clientY);
            if (el && el.classList.contains('cell')) {
                const pos = el.dataset.pos;
                if (!activeCoords.includes(pos)) {
                    activeCoords.push(pos); el.classList.add('sel');
                    checkWin();
                }
            }
        }

        const grid = document.getElementById('grid');
        grid.addEventListener('touchstart', (e) => { isSelecting = true; activeCoords = []; handleMove(e); e.preventDefault(); }, {passive:false});
        grid.addEventListener('touchmove', (e) => { handleMove(e); e.preventDefault(); }, {passive:false});
        window.addEventListener('touchend', () => {
            isSelecting = false;
            document.querySelectorAll('.sel').forEach(c => c.classList.remove('sel'));
        });

        function checkWin() {
            for (let word in wordsPos) {
                const item = document.getElementById('w-' + word);
                if (item.classList.contains('word-found')) continue;

                if (wordsPos[word].every(p => {
                    const c = document.querySelector(`[data-pos="${p}"]`);
                    return c.classList.contains('sel') || c.classList.contains('found');
                })) {
                    wordsPos[word].forEach(p => document.querySelector(`[data-pos="${p}"]`).classList.add('found'));
                    item.classList.add('word-found');
                    foundCount++;
                    if (foundCount === Object.keys(wordsPos).length) {
                        setTimeout(() => { document.getElementById('victory-screen').style.display = 'flex'; }, 400);
                    }
                }
            }
        }
        initGame();
    </script>
</body>
</html>
