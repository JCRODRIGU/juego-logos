
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sopa Logos</title>
    <style>
        * { touch-action: none; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { font-family: sans-serif; text-align: center; background: #fff; margin: 0; overflow: hidden; }
        .header { background: #2e7d32; color: white; padding: 10px; font-weight: bold; }
        #grid { display: grid; grid-template-columns: repeat(15, 1fr); width: 98vw; max-width: 450px; background: #444; gap: 1px; margin: 5px auto; }
        .cell { aspect-ratio: 1/1; background: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 16px; color: #000; }
        .sel { background: #fff176 !important; }
        .found { background: #4caf50 !important; color: white !important; }
        #word-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 4px; padding: 10px; }
        .word-item { padding: 4px 8px; background: #eee; border-radius: 4px; font-size: 11px; border: 1px solid #ccc; }
        .word-found { background: #c8e6c9; color: #2e7d32; text-decoration: line-through; border-color: #2e7d32; }
        .win { display: none; background: #25D366; color: white; padding: 15px; border-radius: 30px; text-decoration: none; font-weight: bold; margin: 10px; display: inline-block; }
    </style>
</head>
<body>
    <div class="header">LIBRERÍA LOGOS</div>
    <div id="grid"></div>
    <div id="word-list"><span class="word-item" id="w-LOGOS">LOGOS</span><span class="word-item" id="w-DIOS">DIOS</span><span class="word-item" id="w-AMOR">AMOR</span><span class="word-item" id="w-PAZ">PAZ</span><span class="word-item" id="w-PULSERA">PULSERA</span><span class="word-item" id="w-BIBLIA">BIBLIA</span><span class="word-item" id="w-CRISTO">CRISTO</span><span class="word-item" id="w-SALMOS">SALMOS</span><span class="word-item" id="w-CATEDRAL">CATEDRAL</span><span class="word-item" id="w-AGENDA">AGENDA</span><span class="word-item" id="w-CRUZ">CRUZ</span><span class="word-item" id="w-KENNEDY">KENNEDY</span><span class="word-item" id="w-AMEN">AMEN</span><span class="word-item" id="w-LIBROS">LIBROS</span></div>
    <a href="https://wa.me/573125756581?text=Gane" id="win-btn" style="display:none" class="win">✅ RECLAMAR PREMIO</a>

    <script>
        const wordsPos = {"LOGOS": ["6-2", "7-2", "8-2", "9-2", "10-2"], "DIOS": ["5-5", "6-5", "7-5", "8-5"], "AMOR": ["8-3", "9-3", "10-3", "11-3"], "PAZ": ["3-10", "4-11", "5-12"], "PULSERA": ["2-8", "3-8", "4-8", "5-8", "6-8", "7-8", "8-8"], "BIBLIA": ["12-9", "12-10", "12-11", "12-12", "12-13", "12-14"], "CRISTO": ["4-2", "4-3", "4-4", "4-5", "4-6", "4-7"], "SALMOS": ["2-6", "3-7", "4-8", "5-9", "6-10", "7-11"], "CATEDRAL": ["1-2", "1-3", "1-4", "1-5", "1-6", "1-7", "1-8", "1-9"], "AGENDA": ["2-14", "3-14", "4-14", "5-14", "6-14", "7-14"], "CRUZ": ["11-7", "11-8", "11-9", "11-10"], "KENNEDY": ["0-7", "0-8", "0-9", "0-10", "0-11", "0-12", "0-13"], "AMEN": ["7-10", "8-11", "9-12", "10-13"], "LIBROS": ["13-3", "13-4", "13-5", "13-6", "13-7", "13-8"]};
        const matrix = [["K", "U", "W", "N", "K", "R", "G", "K", "E", "N", "N", "E", "D", "Y", "W"], ["D", "P", "C", "A", "T", "E", "D", "R", "A", "L", "Y", "K", "P", "T", "A"], ["G", "V", "L", "A", "V", "N", "S", "G", "P", "H", "F", "L", "Q", "W", "A"], ["J", "Y", "J", "V", "U", "T", "F", "A", "U", "M", "P", "Q", "S", "T", "G"], ["G", "A", "C", "R", "I", "S", "T", "O", "L", "C", "O", "A", "A", "O", "E"], ["B", "H", "W", "P", "B", "D", "B", "S", "S", "M", "Z", "E", "Z", "Q", "N"], ["W", "E", "L", "J", "M", "I", "L", "S", "E", "C", "O", "P", "Z", "E", "D"], ["P", "B", "O", "O", "X", "O", "F", "W", "R", "W", "A", "S", "E", "M", "A"], ["X", "U", "G", "A", "W", "S", "S", "V", "A", "N", "O", "M", "N", "G", "H"], ["Z", "R", "O", "M", "N", "V", "F", "A", "S", "N", "A", "H", "E", "E", "C"], ["F", "J", "S", "O", "T", "H", "P", "Y", "U", "A", "G", "D", "G", "N", "I"], ["Y", "P", "R", "R", "E", "D", "J", "C", "R", "U", "Z", "J", "T", "A", "J"], ["I", "M", "N", "X", "H", "N", "U", "M", "U", "B", "I", "B", "L", "I", "A"], ["Q", "P", "X", "L", "I", "B", "R", "O", "S", "F", "B", "L", "D", "M", "W"], ["F", "R", "J", "A", "E", "V", "K", "H", "U", "N", "Z", "H", "T", "L", "Q"]];
        let activeCoords = [];
        let foundCount = 0;
        let isSelecting = false;

        // SISTEMA DE AUDIO REFORZADO
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(freq, duration) {
            try {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch(e) { console.log("Audio bloqueado"); }
        }

        const grid = document.getElementById('grid');
        matrix.forEach((row, r) => row.forEach((char, c) => {
            const div = document.createElement('div');
            div.className = 'cell'; div.textContent = char;
            div.dataset.pos = r + '-' + c;
            grid.appendChild(div);
        }));

        function handleTouch(e) {
            const t = e.touches ? e.touches[0] : e;
            const el = document.elementFromPoint(t.clientX, t.clientY);
            if (el && el.classList.contains('cell')) {
                const pos = el.dataset.pos;
                if (!activeCoords.includes(pos)) {
                    activeCoords.push(pos);
                    el.classList.add('sel');
                    playSound(440, 0.1); // Beep de selección
                    checkWords();
                }
            }
        }

        grid.addEventListener('touchstart', (e) => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            isSelecting = true;
            activeCoords = [];
            handleTouch(e);
        });

        grid.addEventListener('touchmove', handleTouch);

        window.addEventListener('touchend', () => {
            isSelecting = false;
            document.querySelectorAll('.sel').forEach(c => c.classList.remove('sel'));
            activeCoords = [];
        });

        function checkWords() {
            for (let word in wordsPos) {
                const coords = wordsPos[word];
                if (coords.every(p => {
                    const el = document.querySelector(`[data-pos="${p}"]`);
                    return el.classList.contains('sel') || el.classList.contains('found');
                })) {
                    coords.forEach(p => document.querySelector(`[data-pos="${p}"]`).classList.add('found'));
                    const btn = document.getElementById('w-' + word);
                    if (btn && !btn.classList.contains('word-found')) {
                        btn.classList.add('word-found');
                        foundCount++;
                        playSound(880, 0.4); // Sonido de éxito (más agudo)
                        if (foundCount === Object.keys(wordsPos).length) document.getElementById('win-btn').style.display = 'block';
                    }
                }
            }
        }
    </script>
</body>
</html>
