
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reto Bíblico Logos</title>
    <style>
        * { touch-action: none; user-select: none; box-sizing: border-box; }
        body { font-family: sans-serif; text-align: center; background: #ffffff; margin: 0; overflow: hidden; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #2e7d32; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; color: white; }
        .btn-start { padding: 20px 40px; background: white; color: #2e7d32; border-radius: 40px; font-size: 1.5em; border: none; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .header { background: #2e7d32; color: white; padding: 10px; font-weight: bold; }
        #grid { display: grid; grid-template-columns: repeat(12, 1fr); width: 98vw; max-width: 460px; background: #ccc; gap: 1px; margin: 5px auto; border: 2px solid #2e7d32; }
        .cell { aspect-ratio: 1/1; background: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; }
        .sel { background: #fff176 !important; }
        .found { background: #c8e6c9 !important; color: #1b5e20 !important; }
        #word-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 4px; padding: 8px; }
        .word-item { padding: 5px 8px; background: #fff; border-radius: 8px; font-size: 15px; font-weight: bold; color: #2e7d32; border: 1.5px solid #2e7d32; }
        .word-found { background: #2e7d32 !important; color: white !important; text-decoration: line-through; }
        .modal-ad { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; color: white; }
        .ad-card { background: white; color: #333; padding: 15px; border-radius: 15px; width: 90%; max-width: 380px; text-align: center; }
        .ad-card img { width: 100%; height: auto; max-height: 200px; object-fit: contain; }
        .btn-next { background: #2e7d32; color: white; padding: 15px; border: none; border-radius: 30px; font-weight: bold; width: 100%; margin-top: 10px; font-size: 1.1em; }
    </style>
</head>
<body>
    <div id="overlay">
        <h1 style="margin-bottom:30px;">LIBRERÍA LOGOS</h1>
        <button class="btn-start" id="start-btn">INICIAR RETO</button>
        <p style="margin-top:20px;">(Asegúrate de tener el volumen alto)</p>
    </div>

    <div id="ad-modal" class="modal-ad">
        <div class="ad-card">
            <h3 style="color:#2e7d32;">¡Nivel Completado!</h3>
            <img id="ad-img" src="">
            <div id="ad-txt" style="margin: 10px 0; font-weight: bold;"></div>
            <div id="ad-price" style="color:#c62828; font-size: 1.3em; font-weight: bold;"></div>
            <button class="btn-next" onclick="proximoNivel()">SIGUIENTE NIVEL</button>
        </div>
    </div>

    <div class="header" id="lvl-tag">NIVEL 1 / 20</div>
    <div id="grid"></div>
    <div id="word-list"></div>

    <script>
        const niveles = [{"v": "Lampara es a mis pies tu palabra y lumbrera a mi camino", "r": "Salmo 119:105"}, {"v": "Todo lo puedo en Cristo que me fortalece", "r": "Filipenses 4:13"}];
        const anuncios = [{"img": "publicidad1.jpg", "txt": "Botilito Sublimado Mujer", "precio": "$25.000"}, {"img": "publicidad2.jpg", "txt": "Biblia Reina Valera 1960", "precio": "$45.000"}];
        const relleno = ["BIBLIA", "CRISTO", "LOGOS", "AMOR", "FE", "DIOS", "PAZ"];
        let nivelActual = 0;
        let wordsPos = {};
        let foundCount = 0;
        let activeCoords = [];
        let isSelecting = false;
        
        // --- MOTOR DE AUDIO ---
        let audioCtx;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            // Forzar activación en móviles
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playAnclaSound(f, d) {
            if (!audioCtx) return;
            initAudio(); // Re-asegurar estado
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.type = 'sine';
            o.frequency.setValueAtTime(f, audioCtx.currentTime);
            g.gain.setValueAtTime(0.1, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + d);
        }

        document.getElementById('start-btn').addEventListener('click', () => {
            initAudio();
            document.getElementById('overlay').style.display = 'none';
            cargarNivel();
        });

        function cargarNivel() {
            document.getElementById('lvl-tag').textContent = `NIVEL ${nivelActual + 1} / 20`;
            const data = niveles[nivelActual % niveles.length];
            let palabras = data.v.toUpperCase().split(' ').map(p => p.replace(/[^A-Z]/g, '')).filter(p => p.length >= 3);
            palabras = [...new Set(palabras)].slice(0, 12);
            generarTablero(palabras);
        }

        function generarTablero(palabras) {
            const TAM = 12;
            const grid = document.getElementById('grid');
            const list = document.getElementById('word-list');
            grid.innerHTML = ''; list.innerHTML = '';
            foundCount = 0; wordsPos = {};
            let matriz = Array(TAM).fill().map(() => Array(TAM).fill(''));

            palabras.forEach(palabra => {
                let puesta = false;
                for(let i=0; i<50 && !puesta; i++) {
                    let dir = Math.floor(Math.random()*2), r = Math.floor(Math.random()*TAM), c = Math.floor(Math.random()*TAM);
                    let dr = dir === 0 ? 0 : 1, dc = dir === 0 ? 1 : 0;
                    if(r + dr*palabra.length <= TAM && c + dc*palabra.length <= TAM) {
                        let ok = true;
                        for(let j=0; j<palabra.length; j++) if(matriz[r+dr*j][c+dc*j] !== '' && matriz[r+dr*j][c+dc*j] !== palabra[j]) ok = false;
                        if(ok) {
                            wordsPos[palabra] = [];
                            for(let j=0; j<palabra.length; j++) {
                                matriz[r+dr*j][c+dc*j] = palabra[j];
                                wordsPos[palabra].push(`${r+dr*j}-${c+dc*j}`);
                            }
                            puesta = true;
                        }
                    }
                }
            });

            for(let r=0; r<TAM; r++) {
                for(let c=0; c<TAM; c++) {
                    const d = document.createElement('div');
                    d.className = 'cell';
                    d.textContent = matriz[r][c] || String.fromCharCode(65+Math.floor(Math.random()*26));
                    d.dataset.pos = `${r}-${c}`;
                    grid.appendChild(d);
                }
            }
            palabras.forEach(w => {
                const s = document.createElement('span'); s.className = 'word-item';
                s.id = 'w-'+w; s.textContent = w; list.appendChild(s);
            });
        }

        function handleTouch(e) {
            const t = e.touches ? e.touches[0] : e;
            const el = document.elementFromPoint(t.clientX, t.clientY);
            if(el && el.classList.contains('cell')) {
                const pos = el.dataset.pos;
                if(!activeCoords.includes(pos)) {
                    activeCoords.push(pos); el.classList.add('sel');
                    playAnclaSound(440, 0.1); // SONIDO CLIC ORIGINAL
                    check();
                }
            }
        }

        document.getElementById('grid').addEventListener('touchstart', (e) => { isSelecting = true; activeCoords = []; handleTouch(e); });
        document.getElementById('grid').addEventListener('touchmove', (e) => { if(isSelecting) e.preventDefault(); handleTouch(e); }, {passive: false});
        window.addEventListener('touchend', () => { document.querySelectorAll('.sel').forEach(c => c.classList.remove('sel')); isSelecting = false; });

        function check() {
            for(let word in wordsPos) {
                if(wordsPos[word].every(p => document.querySelector(`[data-pos="${p}"]`).classList.contains('sel') || 
                                             document.querySelector(`[data-pos="${p}"]`).classList.contains('found'))) {
                    const itm = document.getElementById('w-'+word);
                    if(itm && !itm.classList.contains('word-found')) {
                        wordsPos[word].forEach(p => document.querySelector(`[data-pos="${p}"]`).classList.add('found'));
                        itm.classList.add('word-found');
                        playAnclaSound(523, 0.2); // SONIDO ÉXITO ORIGINAL
                        foundCount++;
                        if(foundCount === Object.keys(wordsPos).length) setTimeout(lanzarAd, 500);
                    }
                }
            }
        }

        function lanzarAd() {
            const ad = anuncios[nivelActual % anuncios.length];
            document.getElementById('ad-img').src = ad.img;
            document.getElementById('ad-txt').textContent = ad.txt;
            document.getElementById('ad-price').textContent = ad.precio;
            document.getElementById('ad-modal').style.display = 'flex';
        }

        function proximoNivel() {
            document.getElementById('ad-modal').style.display = 'none';
            nivelActual++;
            cargarNivel();
        }
    </script>
</body>
</html>
