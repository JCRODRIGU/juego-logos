
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sopa Logos</title>
    <style>
        * { touch-action: none; user-select: none; box-sizing: border-box; }
        body { font-family: sans-serif; text-align: center; background: #fff; margin: 0; }
        .header { background: #2e7d32; color: white; padding: 12px; font-weight: bold; }
        #grid { display: grid; grid-template-columns: repeat(15, 1fr); width: 95vw; max-width: 420px; background: #444; gap: 1px; margin: 10px auto; border: 4px solid #2e7d32; border-radius: 5px; }
        .cell { aspect-ratio: 1/1; background: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; color: #333; }
        .sel { background: #fff176 !important; }
        .found { background: #4caf50 !important; color: white !important; }
        #word-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; padding: 10px; }
        .word-item { padding: 5px 10px; background: #e8f5e9; border-radius: 20px; font-size: 11px; border: 1px solid #c8e6c9; color: #2e7d32; }
        .word-found { background: #c8e6c9; color: #1b5e20; text-decoration: line-through; border-color: #2e7d32; }
        .win { display: none; background: #25D366; color: white; padding: 15px 30px; border-radius: 30px; text-decoration: none; font-weight: bold; margin: 15px auto; width: fit-content; }
    </style>
</head>
<body>
    <div class="header">LIBRERÍA CRISTIANA LOGOS</div>
    <div id="grid"></div>
    <div id="word-list"><span class="word-item" id="w-VIDA">VIDA</span><span class="word-item" id="w-BIBLICO">BIBLICO</span><span class="word-item" id="w-VALERA">VALERA</span><span class="word-item" id="w-CRISTIANO">CRISTIANO</span><span class="word-item" id="w-BOTILITO">BOTILITO</span><span class="word-item" id="w-SUBLIMADO">SUBLIMADO</span><span class="word-item" id="w-ORACION">ORACION</span><span class="word-item" id="w-LOGOS">LOGOS</span><span class="word-item" id="w-PAN">PAN</span><span class="word-item" id="w-REINA">REINA</span><span class="word-item" id="w-1960">1960</span><span class="word-item" id="w-MUJER">MUJER</span><span class="word-item" id="w-MATRIMONIO">MATRIMONIO</span><span class="word-item" id="w-CAMISETA">CAMISETA</span><span class="word-item" id="w-BIBLIA">BIBLIA</span></div>
    <a href="https://wa.me/573125756581?text=Hola,%20gane%20el%20juego" id="win-btn" class="win">✅ RECLAMAR PREMIO</a>
    <script>
        const wordsPos = {"VIDA": ["4-5", "5-6", "6-7", "7-8"], "BIBLICO": ["6-2", "7-3", "8-4", "9-5", "10-6", "11-7", "12-8"], "VALERA": ["4-7", "4-8", "4-9", "4-10", "4-11", "4-12"], "CRISTIANO": ["5-11", "6-11", "7-11", "8-11", "9-11", "10-11", "11-11", "12-11", "13-11"], "BOTILITO": ["3-1", "4-1", "5-1", "6-1", "7-1", "8-1", "9-1", "10-1"], "SUBLIMADO": ["12-0", "12-1", "12-2", "12-3", "12-4", "12-5", "12-6", "12-7", "12-8"], "ORACION": ["3-3", "3-4", "3-5", "3-6", "3-7", "3-8", "3-9"], "LOGOS": ["4-14", "5-14", "6-14", "7-14", "8-14"], "PAN": ["4-4", "5-4", "6-4"], "REINA": ["5-10", "6-10", "7-10", "8-10", "9-10"], "1960": ["1-5", "1-6", "1-7", "1-8"], "MUJER": ["1-10", "2-10", "3-10", "4-10", "5-10"], "MATRIMONIO": ["5-13", "6-13", "7-13", "8-13", "9-13", "10-13", "11-13", "12-13", "13-13", "14-13"], "CAMISETA": ["13-1", "13-2", "13-3", "13-4", "13-5", "13-6", "13-7", "13-8"], "BIBLIA": ["2-0", "2-1", "2-2", "2-3", "2-4", "2-5"]};
        const matrix = [["D", "S", "I", "S", "X", "V", "J", "M", "V", "E", "T", "Y", "S", "G", "H"], ["Q", "Z", "T", "A", "X", "1", "9", "6", "0", "N", "M", "A", "Y", "Y", "O"], ["B", "I", "B", "L", "I", "A", "R", "C", "B", "F", "U", "M", "U", "Y", "E"], ["A", "B", "K", "O", "R", "A", "C", "I", "O", "N", "J", "N", "V", "S", "G"], ["U", "O", "H", "B", "P", "V", "K", "V", "A", "L", "E", "R", "A", "U", "L"], ["R", "T", "Y", "V", "A", "L", "I", "Q", "J", "Y", "R", "C", "H", "M", "O"], ["V", "I", "B", "N", "N", "E", "M", "D", "M", "S", "E", "R", "U", "A", "G"], ["H", "L", "C", "I", "P", "J", "T", "H", "A", "X", "I", "I", "E", "T", "O"], ["I", "I", "A", "O", "B", "D", "S", "P", "B", "R", "N", "S", "U", "R", "S"], ["N", "T", "T", "Q", "Y", "L", "Z", "Z", "G", "X", "A", "T", "J", "I", "A"], ["I", "O", "O", "Y", "Z", "U", "I", "I", "O", "J", "V", "I", "O", "M", "I"], ["P", "W", "W", "H", "J", "Y", "V", "C", "Q", "A", "Z", "A", "T", "O", "A"], ["S", "U", "B", "L", "I", "M", "A", "D", "O", "O", "K", "N", "P", "N", "U"], ["O", "C", "A", "M", "I", "S", "E", "T", "A", "J", "Z", "O", "R", "I", "P"], ["P", "S", "G", "E", "P", "D", "T", "V", "H", "B", "R", "N", "Y", "O", "T"]];
        let activeCoords = []; let foundCount = 0; let isSelecting = false;
        const grid = document.getElementById('grid');
        matrix.forEach((row, r) => row.forEach((char, c) => {
            const div = document.createElement('div');
            div.className = 'cell'; div.textContent = char;
            div.dataset.pos = r + '-' + c;
            grid.appendChild(div);
        }));
        function handleTouch(e) {
            const t = e.touches ? e.touches[0] : e;
            const el = document.elementFromPoint(t.clientX, t.clientY);
            if (el && el.classList.contains('cell')) {
                const pos = el.dataset.pos;
                if (!activeCoords.includes(pos)) {
                    activeCoords.push(pos); el.classList.add('sel');
                    checkWords();
                }
            }
        }
        grid.addEventListener('touchstart', (e) => { isSelecting = true; activeCoords = []; handleTouch(e); });
        grid.addEventListener('touchmove', (e) => { if (isSelecting) handleTouch(e); });
        window.addEventListener('touchend', () => {
            isSelecting = false;
            document.querySelectorAll('.sel').forEach(c => c.classList.remove('sel'));
            activeCoords = [];
        });
        function checkWords() {
            for (let word in wordsPos) {
                const coords = wordsPos[word];
                if (coords.every(p => {
                    const el = document.querySelector(`[data-pos="${p}"]`);
                    return el.classList.contains('sel') || el.classList.contains('found');
                })) {
                    coords.forEach(p => document.querySelector(`[data-pos="${p}"]`).classList.add('found'));
                    const btn = document.getElementById('w-' + word);
                    if (btn && !btn.classList.contains('word-found')) {
                        btn.classList.add('word-found'); foundCount++;
                        if (foundCount === Object.keys(wordsPos).length) document.getElementById('win-btn').style.display = 'block';
                    }
                }
            }
        }
    </script>
</body>
</html>
