
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sopa Logos Fluida</title>
    <style>
        * { touch-action: none; user-select: none; }
        body { font-family: sans-serif; text-align: center; background: #fff; margin: 0; overflow: hidden; }
        .header { background: #2e7d32; color: white; padding: 10px; font-weight: bold; }
        #grid { 
            display: grid; grid-template-columns: repeat(15, 1fr); 
            width: 98vw; max-width: 450px; background: #ddd; gap: 1px; margin: 5px auto;
            border: 2px solid #2e7d32;
        }
        .cell { 
            aspect-ratio: 1/1; background: white; display: flex; align-items: center; 
            justify-content: center; font-weight: bold; font-size: 15px; color: #000;
        }
        .sel { background: #fff59d !important; }
        .found { background: #4caf50 !important; color: white !important; }
        #word-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; padding: 10px; overflow-y: auto; max-height: 20vh; }
        .word-item { padding: 4px 8px; background: #eee; border-radius: 5px; font-size: 11px; border: 1px solid #ccc; }
        .word-found { background: #c8e6c9; color: #2e7d32; text-decoration: line-through; border-color: #2e7d32; }
        .win { display: none; background: #25D366; color: white; padding: 15px; border-radius: 30px; text-decoration: none; font-weight: bold; margin: 10px; display: inline-block; }
    </style>
</head>
<body>
    <div class="header">LIBRERÍA LOGOS</div>
    <div id="grid"></div>
    <div id="word-list"><span class="word-item" id="w-CATEDRAL">CATEDRAL</span><span class="word-item" id="w-BIBLIA">BIBLIA</span><span class="word-item" id="w-CRISTO">CRISTO</span><span class="word-item" id="w-PAZ">PAZ</span><span class="word-item" id="w-SALMOS">SALMOS</span><span class="word-item" id="w-AMEN">AMEN</span><span class="word-item" id="w-PULSERA">PULSERA</span><span class="word-item" id="w-AGENDA">AGENDA</span><span class="word-item" id="w-KENNEDY">KENNEDY</span><span class="word-item" id="w-DIOS">DIOS</span><span class="word-item" id="w-CRUZ">CRUZ</span><span class="word-item" id="w-LOGOS">LOGOS</span><span class="word-item" id="w-LIBROS">LIBROS</span><span class="word-item" id="w-AMOR">AMOR</span></div>
    <a href="https://wa.me/573125756581?text=Gane" id="win-btn" style="display:none" class="win">✅ ¡RECLAMAR PREMIO!</a>

    <script>
        const wordsPos = {"CATEDRAL": ["6-1", "7-2", "8-3", "9-4", "10-5", "11-6", "12-7", "13-8"], "BIBLIA": ["3-0", "4-1", "5-2", "6-3", "7-4", "8-5"], "CRISTO": ["3-5", "4-6", "5-7", "6-8", "7-9", "8-10"], "PAZ": ["10-2", "11-2", "12-2"], "SALMOS": ["13-0", "13-1", "13-2", "13-3", "13-4", "13-5"], "AMEN": ["11-9", "11-10", "11-11", "11-12"], "PULSERA": ["4-2", "5-3", "6-4", "7-5", "8-6", "9-7", "10-8"], "AGENDA": ["4-7", "5-8", "6-9", "7-10", "8-11", "9-12"], "KENNEDY": ["12-8", "12-9", "12-10", "12-11", "12-12", "12-13", "12-14"], "DIOS": ["3-2", "4-3", "5-4", "6-5"], "CRUZ": ["3-14", "4-14", "5-14", "6-14"], "LOGOS": ["2-9", "3-10", "4-11", "5-12", "6-13"], "LIBROS": ["3-7", "4-8", "5-9", "6-10", "7-11", "8-12"], "AMOR": ["4-4", "5-5", "6-6", "7-7"]};
        const matrix = [["G", "L", "I", "X", "T", "S", "I", "Z", "A", "Q", "P", "F", "O", "G", "W"], ["C", "Q", "C", "T", "A", "A", "Q", "X", "B", "F", "C", "V", "F", "S", "M"], ["Q", "C", "E", "L", "T", "M", "F", "I", "X", "L", "X", "I", "M", "Z", "W"], ["B", "Z", "D", "I", "F", "C", "D", "L", "K", "G", "O", "Z", "B", "C", "C"], ["Z", "I", "P", "I", "A", "C", "R", "A", "I", "H", "J", "G", "X", "J", "R"], ["K", "I", "B", "U", "O", "M", "B", "I", "G", "B", "O", "U", "O", "F", "U"], ["H", "C", "O", "L", "L", "S", "O", "R", "S", "E", "R", "U", "Q", "S", "Z"], ["U", "F", "A", "M", "I", "S", "B", "R", "P", "T", "N", "O", "A", "Q", "F"], ["Q", "H", "P", "T", "G", "A", "E", "M", "T", "Z", "O", "D", "S", "U", "W"], ["I", "E", "V", "D", "E", "W", "S", "R", "X", "G", "C", "V", "A", "R", "J"], ["U", "G", "P", "K", "O", "D", "X", "M", "A", "D", "E", "P", "E", "J", "U"], ["M", "F", "A", "A", "V", "X", "R", "I", "S", "A", "M", "E", "N", "D", "W"], ["Z", "U", "Z", "S", "S", "Y", "B", "A", "K", "E", "N", "N", "E", "D", "Y"], ["S", "A", "L", "M", "O", "S", "O", "D", "L", "D", "O", "C", "Y", "N", "T"], ["N", "T", "N", "O", "L", "O", "P", "O", "D", "D", "N", "O", "A", "R", "N"]];
        let activeCoords = [];
        let foundCount = 0;
        let isDragging = false;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playBeep(f, d) {
            try {
                const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                o.frequency.setValueAtTime(f, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
                o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + d);
            } catch(e){}
        }

        const grid = document.getElementById('grid');
        matrix.forEach((row, r) => row.forEach((char, c) => {
            const div = document.createElement('div');
            div.className = 'cell'; div.textContent = char;
            div.dataset.pos = r + '-' + c;
            grid.appendChild(div);
        }));

        function handlePointer(e) {
            const t = e.touches ? e.touches[0] : e;
            const el = document.elementFromPoint(t.clientX, t.clientY);
            if (el && el.classList.contains('cell')) {
                const pos = el.dataset.pos;
                if (!activeCoords.includes(pos)) {
                    activeCoords.push(pos);
                    el.classList.add('sel');
                    playBeep(440, 0.1);
                    checkMatch();
                }
            }
        }

        function checkMatch() {
            for (let word in wordsPos) {
                const coords = wordsPos[word];
                if (coords.every(p => activeCoords.includes(p))) {
                    coords.forEach(p => {
                        const cell = document.querySelector(`[data-pos="${p}"]`);
                        cell.classList.add('found');
                        cell.classList.remove('sel');
                    });
                    const btn = document.getElementById('w-' + word);
                    if (!btn.classList.contains('word-found')) {
                        btn.classList.add('word-found');
                        foundCount++;
                        playBeep(660, 0.3);
                        activeCoords = activeCoords.filter(p => !coords.includes(p));
                    }
                }
            }
            if (foundCount === Object.keys(wordsPos).length) document.getElementById('win-btn').style.display = 'block';
        }

        grid.addEventListener('touchstart', (e) => { 
            if(audioCtx.state === 'suspended') audioCtx.resume();
            isDragging = true; 
            handlePointer(e); 
        });
        grid.addEventListener('touchmove', (e) => { if(isDragging) handlePointer(e); });
        window.addEventListener('touchend', () => { 
            isDragging = false; 
            document.querySelectorAll('.sel').forEach(c => c.classList.remove('sel'));
            activeCoords = [];
        });
    </script>
</body>
</html>
