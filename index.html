
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sopa Logos</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #fff; margin: 0; touch-action: none; user-select: none; }
        .header { background: #2e7d32; color: white; padding: 10px; font-weight: bold; }
        #grid { 
            display: grid; grid-template-columns: repeat(15, 1fr); 
            width: 98vw; max-width: 450px; background: #000; gap: 1px; margin: 5px auto;
        }
        .cell { 
            aspect-ratio: 1/1; background: white; display: flex; align-items: center; 
            justify-content: center; font-weight: bold; font-size: 14px; 
        }
        .sel { background: #ffeb3b !important; }
        .found { background: #4caf50 !important; color: white !important; }
        #word-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; padding: 10px; }
        .word-item { padding: 4px 8px; background: #eee; border-radius: 5px; font-size: 11px; border: 1px solid #ccc; }
        .word-found { background: #c8e6c9; color: #2e7d32; text-decoration: line-through; }
        .win { display: none; background: #25D366; color: white; padding: 15px; border-radius: 10px; text-decoration: none; margin: 10px; display: inline-block; }
    </style>
</head>
<body>
    <div class="header">LIBRERÍA LOGOS</div>
    <div id="grid"></div>
    <div id="word-list"><span class="word-item" id="w-SALMOS">SALMOS</span><span class="word-item" id="w-AGENDA">AGENDA</span><span class="word-item" id="w-LOGOS">LOGOS</span><span class="word-item" id="w-PAZ">PAZ</span><span class="word-item" id="w-BIBLIA">BIBLIA</span><span class="word-item" id="w-PULSERA">PULSERA</span><span class="word-item" id="w-AMOR">AMOR</span><span class="word-item" id="w-KENNEDY">KENNEDY</span><span class="word-item" id="w-LIBROS">LIBROS</span><span class="word-item" id="w-CRISTO">CRISTO</span><span class="word-item" id="w-CATEDRAL">CATEDRAL</span><span class="word-item" id="w-DIOS">DIOS</span><span class="word-item" id="w-AMEN">AMEN</span><span class="word-item" id="w-CRUZ">CRUZ</span></div>
    <a href="https://wa.me/573125756581?text=Gane" id="win-btn" style="display:none" class="win">¡GANASTE! RECLAMAR</a>

    <script>
        const words = ["SALMOS", "AGENDA", "LOGOS", "PAZ", "BIBLIA", "PULSERA", "AMOR", "KENNEDY", "LIBROS", "CRISTO", "CATEDRAL", "DIOS", "AMEN", "CRUZ"];
        const matrix = [["Y", "M", "R", "L", "I", "B", "R", "O", "S", "N", "T", "R", "P", "A", "Z"], ["C", "W", "I", "X", "P", "B", "A", "E", "R", "C", "R", "I", "S", "T", "O"], ["J", "T", "C", "D", "K", "X", "L", "W", "X", "G", "Y", "D", "K", "Q", "I"], ["N", "H", "B", "K", "R", "A", "Y", "O", "L", "T", "C", "U", "A", "A", "I"], ["R", "G", "Z", "A", "A", "S", "D", "G", "G", "N", "R", "B", "L", "S", "L"], ["K", "S", "K", "K", "C", "G", "B", "P", "S", "O", "Z", "I", "H", "A", "V"], ["T", "E", "Y", "C", "Z", "A", "E", "I", "U", "T", "S", "R", "W", "L", "G"], ["C", "S", "N", "O", "A", "G", "T", "N", "B", "L", "S", "N", "Q", "M", "C"], ["R", "C", "P", "N", "R", "U", "M", "E", "D", "L", "S", "Z", "P", "O", "Y"], ["U", "W", "Y", "K", "E", "M", "R", "C", "D", "A", "I", "E", "D", "S", "Q"], ["Z", "M", "A", "A", "G", "D", "H", "R", "I", "R", "V", "A", "R", "V", "B"], ["H", "S", "S", "M", "D", "Z", "Y", "Q", "E", "N", "A", "M", "C", "A", "L"], ["B", "D", "B", "E", "T", "R", "F", "H", "O", "S", "J", "L", "D", "K", "M"], ["R", "H", "Q", "N", "L", "E", "M", "H", "N", "A", "M", "O", "R", "Q", "F"], ["O", "D", "I", "O", "S", "T", "Y", "V", "Q", "A", "C", "G", "S", "V", "S"]];
        let selectedEls = [], foundCount = 0;

        matrix.forEach((row, r) => row.forEach((char, c) => {
            const div = document.createElement('div');
            div.className = 'cell'; div.textContent = char;
            div.dataset.r = r; div.dataset.c = c;
            
            // USAMOS EVENTOS SIMPLES DE TACTO
            div.ontouchstart = (e) => { e.preventDefault(); handleSelect(div); };
            div.onmousedown = () => handleSelect(div);
            
            document.getElementById('grid').appendChild(div);
        }));

        function handleSelect(el) {
            if (el.classList.contains('found')) return;
            
            if (el.classList.contains('sel')) {
                el.classList.remove('sel');
                selectedEls = selectedEls.filter(i => i !== el);
            } else {
                el.classList.add('sel');
                selectedEls.push(el);
            }
            
            const txt = selectedEls.map(i => i.textContent).join('');
            const rev = txt.split('').reverse().join('');
            
            if (words.includes(txt) || words.includes(rev)) {
                const final = words.includes(txt) ? txt : rev;
                selectedEls.forEach(i => { i.classList.add('found'); i.classList.remove('sel'); });
                document.getElementById('w-' + final).classList.add('word-found');
                foundCount++;
                selectedEls = [];
                if (foundCount === words.length) document.getElementById('win-btn').style.display = 'block';
            }
        }
    </script>
</body>
</html>
