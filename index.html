
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sopa Logos</title>
    <style>
        * { touch-action: none; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { font-family: sans-serif; text-align: center; background: #fff; margin: 0; overflow: hidden; }
        .header { background: #2e7d32; color: white; padding: 10px; font-weight: bold; }
        #grid { display: grid; grid-template-columns: repeat(15, 1fr); width: 98vw; max-width: 450px; background: #444; gap: 1px; margin: 5px auto; }
        .cell { aspect-ratio: 1/1; background: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 16px; color: #000; }
        .sel { background: #fff176 !important; }
        .found { background: #4caf50 !important; color: white !important; }
        #word-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 4px; padding: 10px; }
        .word-item { padding: 4px 8px; background: #eee; border-radius: 4px; font-size: 11px; border: 1px solid #ccc; }
        .word-found { background: #c8e6c9; color: #2e7d32; text-decoration: line-through; border-color: #2e7d32; }
        .win { display: none; background: #25D366; color: white; padding: 15px; border-radius: 30px; text-decoration: none; font-weight: bold; margin: 10px; display: inline-block; }
    </style>
</head>
<body>
    <div class="header">LIBRERÍA LOGOS</div>
    <div id="grid"></div>
    <div id="word-list"><span class="word-item" id="w-CATEDRAL">CATEDRAL</span><span class="word-item" id="w-BIBLIA">BIBLIA</span><span class="word-item" id="w-DIOS">DIOS</span><span class="word-item" id="w-AMOR">AMOR</span><span class="word-item" id="w-PAZ">PAZ</span><span class="word-item" id="w-SALMOS">SALMOS</span><span class="word-item" id="w-LIBROS">LIBROS</span><span class="word-item" id="w-KENNEDY">KENNEDY</span><span class="word-item" id="w-CRUZ">CRUZ</span><span class="word-item" id="w-AGENDA">AGENDA</span><span class="word-item" id="w-PULSERA">PULSERA</span><span class="word-item" id="w-CRISTO">CRISTO</span><span class="word-item" id="w-LOGOS">LOGOS</span><span class="word-item" id="w-AMEN">AMEN</span></div>
    <a href="https://wa.me/573125756581?text=Gane" id="win-btn" style="display:none" class="win">✅ RECLAMAR PREMIO</a>

    <script>
        const wordsPos = {"CATEDRAL": ["3-1", "4-2", "5-3", "6-4", "7-5", "8-6", "9-7", "10-8"], "BIBLIA": ["0-5", "1-6", "2-7", "3-8", "4-9", "5-10"], "DIOS": ["2-1", "2-2", "2-3", "2-4"], "AMOR": ["4-1", "5-2", "6-3", "7-4"], "PAZ": ["13-2", "13-3", "13-4"], "SALMOS": ["3-7", "4-8", "5-9", "6-10", "7-11", "8-12"], "LIBROS": ["10-9", "10-10", "10-11", "10-12", "10-13", "10-14"], "KENNEDY": ["0-6", "1-7", "2-8", "3-9", "4-10", "5-11", "6-12"], "CRUZ": ["14-6", "14-7", "14-8", "14-9"], "AGENDA": ["11-8", "11-9", "11-10", "11-11", "11-12", "11-13"], "PULSERA": ["3-2", "4-3", "5-4", "6-5", "7-6", "8-7", "9-8"], "CRISTO": ["7-1", "8-1", "9-1", "10-1", "11-1", "12-1"], "LOGOS": ["1-9", "1-10", "1-11", "1-12", "1-13"], "AMEN": ["2-5", "3-6", "4-7", "5-8"]};
        const matrix = [["E", "I", "I", "A", "N", "B", "K", "W", "T", "W", "A", "O", "F", "F", "O"], ["B", "P", "K", "Z", "L", "K", "I", "E", "T", "L", "O", "G", "O", "S", "Q"], ["T", "D", "I", "O", "S", "A", "O", "B", "N", "T", "R", "K", "E", "D", "T"], ["J", "C", "P", "L", "K", "Z", "M", "S", "L", "N", "Q", "B", "Y", "V", "N"], ["V", "A", "A", "U", "O", "P", "M", "E", "A", "I", "E", "H", "V", "Y", "N"], ["Y", "T", "M", "T", "L", "N", "L", "C", "N", "L", "A", "D", "N", "I", "C"], ["U", "Y", "V", "O", "E", "S", "Y", "P", "T", "U", "M", "X", "Y", "P", "W"], ["M", "C", "W", "R", "R", "D", "E", "M", "J", "U", "O", "O", "K", "B", "V"], ["U", "R", "J", "B", "O", "R", "R", "R", "C", "B", "U", "T", "S", "M", "B"], ["J", "I", "C", "P", "N", "O", "Z", "A", "A", "Y", "B", "D", "O", "Z", "U"], ["W", "S", "Y", "X", "C", "W", "U", "X", "L", "L", "I", "B", "R", "O", "S"], ["Y", "T", "C", "V", "L", "N", "C", "Y", "A", "G", "E", "N", "D", "A", "Q"], ["H", "O", "O", "K", "N", "G", "T", "X", "A", "V", "O", "W", "O", "R", "V"], ["V", "W", "P", "A", "Z", "V", "J", "E", "L", "G", "K", "Q", "G", "W", "H"], ["O", "O", "O", "H", "P", "E", "C", "R", "U", "Z", "Z", "H", "V", "E", "L"]];
        let activeCoords = [];
        let foundCount = 0;
        let isSelecting = false;

        // SISTEMA DE AUDIO REFORZADO
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(freq, duration) {
            try {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch(e) { console.log("Audio bloqueado"); }
        }

        const grid = document.getElementById('grid');
        matrix.forEach((row, r) => row.forEach((char, c) => {
            const div = document.createElement('div');
            div.className = 'cell'; div.textContent = char;
            div.dataset.pos = r + '-' + c;
            grid.appendChild(div);
        }));

        function handleTouch(e) {
            const t = e.touches ? e.touches[0] : e;
            const el = document.elementFromPoint(t.clientX, t.clientY);
            if (el && el.classList.contains('cell')) {
                const pos = el.dataset.pos;
                if (!activeCoords.includes(pos)) {
                    activeCoords.push(pos);
                    el.classList.add('sel');
                    playSound(440, 0.1); // Beep de selección
                    checkWords();
                }
            }
        }

        grid.addEventListener('touchstart', (e) => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            isSelecting = true;
            activeCoords = [];
            handleTouch(e);
        });

        grid.addEventListener('touchmove', handleTouch);

        window.addEventListener('touchend', () => {
            isSelecting = false;
            document.querySelectorAll('.sel').forEach(c => c.classList.remove('sel'));
            activeCoords = [];
        });

        function checkWords() {
            for (let word in wordsPos) {
                const coords = wordsPos[word];
                if (coords.every(p => {
                    const el = document.querySelector(`[data-pos="${p}"]`);
                    return el.classList.contains('sel') || el.classList.contains('found');
                })) {
                    coords.forEach(p => document.querySelector(`[data-pos="${p}"]`).classList.add('found'));
                    const btn = document.getElementById('w-' + word);
                    if (btn && !btn.classList.contains('word-found')) {
                        btn.classList.add('word-found');
                        foundCount++;
                        playSound(880, 0.4); // Sonido de éxito (más agudo)
                        if (foundCount === Object.keys(wordsPos).length) document.getElementById('win-btn').style.display = 'block';
                    }
                }
            }
        }
    </script>
</body>
</html>
