
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reto Bíblico Logos</title>
    <style>
        * { touch-action: none; user-select: none; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #ffffff; margin: 0; overflow: hidden; }
        
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #2e7d32; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; color: white; }
        .btn-start { padding: 18px 40px; background: white; color: #2e7d32; border-radius: 50px; font-size: 1.4em; border: none; font-weight: bold; cursor: pointer; }

        .header { background: #2e7d32; color: white; padding: 10px; font-weight: bold; }
        
        #verse-container { background: #e8f5e9; padding: 15px; margin: 5px 10px; border-radius: 10px; border-left: 5px solid #2e7d32; min-height: 85px; display: flex; align-items: center; justify-content: center; }
        #verse-text { font-size: 0.95rem; color: #1b5e20; font-weight: bold; line-height: 1.4; }

        #grid { display: grid; grid-template-columns: repeat(12, 1fr); width: 96vw; max-width: 440px; background: #ccc; gap: 1px; margin: 0 auto; border: 2px solid #2e7d32; }
        .cell { aspect-ratio: 1/1; background: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; }
        .sel { background: #fff176 !important; }
        .found { background: #c8e6c9 !important; color: #1b5e20 !important; }

        #word-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 4px; padding: 10px; height: 130px; overflow-y: auto; background: #f9f9f9; border-top: 1px solid #ddd; }
        .word-item { padding: 4px 8px; background: white; border-radius: 10px; font-size: 13px; font-weight: bold; color: #2e7d32; border: 1px solid #2e7d32; }
        .word-found { background: #2e7d32 !important; color: white !important; text-decoration: line-through; }

        .modal-ad { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; }
        .ad-card { background: white; color: #333; padding: 20px; border-radius: 20px; width: 85%; max-width: 340px; text-align: center; }
        .ad-card img { width: 100%; max-height: 180px; object-fit: contain; margin: 10px 0; border-radius: 10px; }
        .btn-next { background: #2e7d32; color: white; padding: 18px; border: none; border-radius: 35px; font-weight: bold; width: 100%; font-size: 1.1em; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="overlay">
        <h1>LIBRERÍA LOGOS</h1>
        <button class="btn-start" id="start-btn">EMPEZAR RETO</button>
    </div>

    <div id="ad-modal" class="modal-ad">
        <div class="ad-card">
            <div style="font-size: 0.8em; color: #666; font-weight: bold;">DISPONIBLE EN TIENDA</div>
            <img id="ad-img" src="">
            <div id="ad-txt" style="font-weight: bold; margin-bottom: 5px;"></div>
            <div id="ad-price" style="color:#c62828; font-size: 1.4em; font-weight: bold; margin-bottom: 15px;"></div>
            <button class="btn-next" id="btn-next-lvl">SIGUIENTE NIVEL</button>
        </div>
    </div>

    <div class="header" id="lvl-tag">NIVEL 1</div>
    <div id="verse-container"><div id="verse-text"></div></div>
    <div id="grid"></div>
    <div id="word-list"></div>

    <script>
        const niveles = [{"v": "Lampara es a mis pies tu palabra y lumbrera a mi camino", "r": "Salmo 119:105"}, {"v": "Todo lo puedo en Cristo que me fortalece", "r": "Filipenses 4:13"}, {"v": "Jehova es mi pastor nada me faltara", "r": "Salmo 23:1"}, {"v": "En el principio creo Dios los cielos y la tierra", "r": "Genesis 1:1"}, {"v": "Cree en el Senor Jesucristo y seras salvo tu y tu casa", "r": "Hechos 16:31"}, {"v": "El amor es sufrido es benigno el amor no tiene envidia", "r": "1 Corintios 13:4"}, {"v": "Clama a mi y yo te respondere y te ensenare cosas grandes", "r": "Jeremias 33:3"}, {"v": "Buscad primeramente el reino de Dios y su justicia", "r": "Mateo 6:33"}, {"v": "Mira que te mando que te esfuerces y seas valiente", "r": "Josue 1:9"}, {"v": "Dios es nuestro amparo y fortaleza nuestro pronto auxilio", "r": "Salmo 46:1"}];
        const anuncios = [{"img": "publicidad1.jpg", "txt": "Botilito Sublimado Mujer", "precio": "$25.000"}, {"img": "publicidad2.jpg", "txt": "Biblia Reina Valera 1960", "precio": "$45.000"}, {"img": "publicidad3.jpg", "txt": "Camiseta Dise\u00f1o Especial", "precio": "$35.000"}, {"img": "publicidad4.jpg", "txt": "Diccionario B\u00edblico", "precio": "$55.000"}, {"img": "publicidad5.jpg", "txt": "Pan de Vida (Promesas)", "precio": "$12.000"}];
        const rellenoLogos = ["BIBLIA", "CRISTO", "IGLESIA", "LOGOS", "AMOR", "FE", "ORACION", "PAZ", "DIOS", "GRACIA", "KENNEDY", "BOGOTA", "SALVACION", "LUZ", "VIDA"];
        let nivelActual = 0;
        let wordsPos = {};
        let foundCount = 0;
        let activeCoords = [];
        let isSelecting = false;
        let audioCtx;

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(f, d) {
            if (!audioCtx) return;
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.type = 'sine';
            o.frequency.setValueAtTime(f, audioCtx.currentTime);
            g.gain.setValueAtTime(0.1, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + d);
        }

        document.getElementById('start-btn').addEventListener('click', () => {
            initAudio();
            document.getElementById('overlay').style.display = 'none';
            cargarNivel();
        });

        // BOTÓN DE SIGUIENTE NIVEL CON FIX DE RENDERIZADO
        document.getElementById('btn-next-lvl').addEventListener('click', () => {
            document.getElementById('ad-modal').style.display = 'none';
            nivelActual++;
            // Usamos requestAnimationFrame para asegurar que el modal se cierre antes de procesar el nivel
            requestAnimationFrame(() => {
                setTimeout(cargarNivel, 50);
            });
        });

        function cargarNivel() {
            const data = niveles[nivelActual % niveles.length];
            document.getElementById('lvl-tag').textContent = `NIVEL ${nivelActual + 1} - ${data.r}`;
            document.getElementById('verse-text').textContent = `"${data.v}"`;
            
            let palabras = data.v.toUpperCase().split(' ').map(p => p.replace(/[^A-Z]/g, '')).filter(p => p.length >= 3);
            palabras = [...new Set(palabras)];
            
            let idx = 0;
            while(palabras.length < 15) {
                let r = rellenoLogos[idx % rellenoLogos.length];
                if(!palabras.includes(r)) palabras.push(r);
                idx++;
            }
            generarTablero(palabras.slice(0, 15));
        }

        function generarTablero(palabras) {
            const TAM = 12;
            const grid = document.getElementById('grid');
            const list = document.getElementById('word-list');
            
            // Limpieza total antes de generar
            grid.innerHTML = ''; 
            list.innerHTML = '';
            foundCount = 0; 
            wordsPos = {};
            
            let matriz = Array(TAM).fill().map(() => Array(TAM).fill(''));

            palabras.forEach(palabra => {
                let puesta = false;
                for(let i=0; i<150 && !puesta; i++) {
                    let dir = Math.floor(Math.random() * 3); // 0:H, 1:V, 2:D
                    let dr = dir === 0 ? 0 : 1;
                    let dc = dir === 1 ? 0 : 1;
                    let r = Math.floor(Math.random() * (TAM - (dr * palabra.length)));
                    let c = Math.floor(Math.random() * (TAM - (dc * palabra.length)));
                    
                    let ok = true;
                    for(let j=0; j<palabra.length; j++) 
                        if(matriz[r+dr*j][c+dc*j] !== '' && matriz[r+dr*j][c+dc*j] !== palabra[j]) ok = false;
                    
                    if(ok) {
                        wordsPos[palabra] = [];
                        for(let j=0; j<palabra.length; j++) {
                            matriz[r+dr*j][c+dc*j] = palabra[j];
                            wordsPos[palabra].push(`${r+dr*j}-${c+dc*j}`);
                        }
                        puesta = true;
                    }
                }
            });

            for(let r=0; r<TAM; r++) {
                for(let c=0; c<TAM; c++) {
                    const d = document.createElement('div');
                    d.className = 'cell';
                    d.textContent = matriz[r][c] || String.fromCharCode(65+Math.floor(Math.random()*26));
                    d.dataset.pos = `${r}-${c}`;
                    grid.appendChild(d);
                }
            }
            palabras.forEach(w => {
                const s = document.createElement('span'); s.className = 'word-item';
                s.id = 'w-'+w; s.textContent = w; list.appendChild(s);
            });
        }

        function handleTouch(e) {
            const t = e.touches ? e.touches[0] : e;
            const el = document.elementFromPoint(t.clientX, t.clientY);
            if(el && el.classList.contains('cell')) {
                const pos = el.dataset.pos;
                if(!activeCoords.includes(pos)) {
                    activeCoords.push(pos); el.classList.add('sel');
                    playSound(440, 0.05); 
                    check();
                }
            }
        }

        document.getElementById('grid').addEventListener('touchstart', (e) => { isSelecting = true; activeCoords = []; handleTouch(e); });
        document.getElementById('grid').addEventListener('touchmove', (e) => { if(isSelecting) e.preventDefault(); handleTouch(e); }, {passive: false});
        window.addEventListener('touchend', () => { document.querySelectorAll('.sel').forEach(c => c.classList.remove('sel')); isSelecting = false; });

        function check() {
            for(let word in wordsPos) {
                if(wordsPos[word].every(p => document.querySelector(`[data-pos="${p}"]`).classList.contains('sel') || 
                                             document.querySelector(`[data-pos="${p}"]`).classList.contains('found'))) {
                    const itm = document.getElementById('w-'+word);
                    if(itm && !itm.classList.contains('word-found')) {
                        wordsPos[word].forEach(p => document.querySelector(`[data-pos="${p}"]`).classList.add('found'));
                        itm.classList.add('word-found');
                        playSound(523, 0.15); 
                        foundCount++;
                        if(foundCount === Object.keys(wordsPos).length) setTimeout(mostrarAd, 600);
                    }
                }
            }
        }

        function mostrarAd() {
            const ad = anuncios[nivelActual % anuncios.length];
            document.getElementById('ad-img').src = ad.img;
            document.getElementById('ad-txt').textContent = ad.txt;
            document.getElementById('ad-price').textContent = ad.precio;
            document.getElementById('ad-modal').style.display = 'flex';
        }
    </script>
</body>
</html>
