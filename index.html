
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Librería Logos - Sopa PRO</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; margin: 0; touch-action: none; user-select: none; }
        #grid { 
            display: grid; grid-template-columns: repeat(15, 1fr); gap: 1px; 
            width: 98vw; max-width: 450px; background: #333; padding: 2px; margin-top: 10px;
        }
        .cell { 
            aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; 
            background: #fff; color: #000; font-weight: bold; font-size: 0.9rem; pointer-events: none;
        }
        .sel { background: #ffee58 !important; }
        .found { background: #43a047 !important; color: white !important; }
        #word-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 4px; margin: 10px; padding: 10px; background: #222; width: 90vw; border-radius: 8px; }
        .word-item { padding: 4px 8px; background: #333; border-radius: 4px; font-size: 0.7rem; border: 1px solid #444; }
        .word-found { background: #1b5e20; color: #81c784; text-decoration: line-through; }
        .btn-win { display: none; background: #25D366; color: white; padding: 15px 30px; border-radius: 30px; text-decoration: none; font-weight: bold; margin: 20px; font-size: 1.1rem; }
    </style>
</head>
<body>
    <h3 style="color:#4caf50; margin:10px 0;">📖 LIBRERÍA LOGOS</h3>
    <div id="grid"></div>
    <div id="word-list"><span class="word-item" id="w-CATEDRAL">CATEDRAL</span><span class="word-item" id="w-KENNEDY">KENNEDY</span><span class="word-item" id="w-PULSERA">PULSERA</span><span class="word-item" id="w-CRISTO">CRISTO</span><span class="word-item" id="w-SALMOS">SALMOS</span><span class="word-item" id="w-BIBLIA">BIBLIA</span><span class="word-item" id="w-LIBROS">LIBROS</span><span class="word-item" id="w-AGENDA">AGENDA</span><span class="word-item" id="w-LOGOS">LOGOS</span><span class="word-item" id="w-AMOR">AMOR</span><span class="word-item" id="w-CRUZ">CRUZ</span><span class="word-item" id="w-AMEN">AMEN</span><span class="word-item" id="w-DIOS">DIOS</span><span class="word-item" id="w-PAZ">PAZ</span></div>
    <a href="https://wa.me/573125756581?text=Gane" class="btn-win" id="win-btn">✅ RECLAMAR PREMIO</a>

    <script>
        const words = ["CATEDRAL", "KENNEDY", "PULSERA", "CRISTO", "SALMOS", "BIBLIA", "LIBROS", "AGENDA", "LOGOS", "AMOR", "CRUZ", "AMEN", "DIOS", "PAZ"];
        const matrix = [["X", "P", "U", "A", "B", "K", "D", "X", "P", "K", "P", "P", "N", "Y", "D"], ["U", "Y", "X", "E", "G", "Q", "L", "I", "G", "K", "L", "A", "Y", "P", "B"], ["T", "W", "C", "P", "U", "E", "C", "I", "O", "Y", "K", "F", "Z", "Q", "G"], ["U", "O", "U", "L", "K", "G", "N", "W", "B", "S", "U", "D", "T", "Y", "E"], ["B", "J", "Y", "B", "E", "U", "J", "D", "Z", "R", "J", "J", "F", "F", "J"], ["A", "B", "U", "I", "Q", "Z", "A", "G", "A", "W", "O", "X", "U", "B", "X"], ["P", "L", "V", "B", "K", "G", "R", "M", "R", "F", "Z", "S", "M", "N", "O"], ["U", "F", "I", "L", "H", "L", "X", "C", "K", "E", "N", "N", "E", "D", "Y"], ["L", "U", "W", "I", "G", "L", "O", "J", "A", "N", "L", "X", "I", "C", "P"], ["S", "C", "R", "A", "S", "B", "V", "G", "T", "M", "V", "M", "S", "R", "Z"], ["E", "R", "B", "G", "P", "A", "P", "Y", "O", "Q", "O", "M", "D", "U", "Z"], ["R", "I", "A", "F", "S", "A", "L", "M", "O", "S", "M", "R", "O", "Z", "Z"], ["A", "S", "M", "N", "D", "L", "T", "Y", "A", "I", "U", "R", "M", "F", "V"], ["G", "T", "E", "K", "E", "Q", "C", "A", "T", "E", "D", "R", "A", "L", "O"], ["J", "O", "N", "K", "U", "W", "V", "L", "L", "X", "X", "P", "U", "A", "Q"]];
        const grid = document.getElementById('grid');
        let startCell = null, selecting = false, foundCount = 0;
        
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function beep(f, type, vol, dur) {
            const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
            o.type = type; o.frequency.setValueAtTime(f, audioCtx.currentTime);
            g.gain.setValueAtTime(vol, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
            o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + dur);
        }

        matrix.forEach((row, r) => row.forEach((char, c) => {
            const div = document.createElement('div');
            div.className = 'cell'; div.textContent = char;
            div.dataset.r = r; div.dataset.c = c;
            grid.appendChild(div);
        }));

        const getCoords = (e) => {
            const t = e.touches ? e.touches[0] : e;
            const el = document.elementFromPoint(t.clientX, t.clientY);
            if (el && el.parentElement === grid) return { r: parseInt(el.dataset.r), c: parseInt(el.dataset.c), el: el };
            return null;
        };

        const updateSelection = (endCell) => {
            document.querySelectorAll('.cell').forEach(c => c.classList.remove('sel'));
            if (!startCell || !endCell) return [];
            
            let dr = endCell.r - startCell.r, dc = endCell.c - startCell.c;
            let steps = Math.max(Math.abs(dr), Math.abs(dc));
            if (steps === 0) return [startCell.el];

            // Forzar línea recta (H, V o D de 45°)
            let sr = dr === 0 ? 0 : dr / Math.abs(dr);
            let sc = dc === 0 ? 0 : dc / Math.abs(dc);
            if (Math.abs(dr) !== Math.abs(dc) && dr !== 0 && dc !== 0) return []; 

            let selectedEls = [];
            for (let i = 0; i <= steps; i++) {
                let r = startCell.r + (i * sr), c = startCell.c + (i * sc);
                let el = document.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);
                if (el) { el.classList.add('sel'); selectedEls.push(el); }
            }
            return selectedEls;
        };

        const handleStart = (e) => {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const coords = getCoords(e);
            if (coords) { selecting = true; startCell = coords; coords.el.classList.add('sel'); beep(400, 'sine', 0.1, 0.1); }
        };

        const handleMove = (e) => {
            if (!selecting) return;
            const coords = getCoords(e);
            if (coords) updateSelection(coords);
        };

        const handleEnd = () => {
            if (!selecting) return;
            const selectedEls = document.querySelectorAll('.sel');
            const word = Array.from(selectedEls).map(el => el.textContent).join('');
            const rev = word.split('').reverse().join('');
            
            if (words.includes(word) || words.includes(rev)) {
                const val = words.includes(word) ? word : rev;
                selectedEls.forEach(el => { el.classList.add('found'); el.classList.remove('sel'); });
                const item = document.getElementById('w-' + val);
                if (item && !item.classList.contains('word-found')) {
                    item.classList.add('word-found'); foundCount++; beep(800, 'square', 0.2, 0.3);
                }
                if (foundCount === words.length) document.getElementById('win-btn').style.display = 'block';
            }
            document.querySelectorAll('.sel').forEach(c => c.classList.remove('sel'));
            selecting = false; startCell = null;
        };

        grid.addEventListener('touchstart', e => { e.preventDefault(); handleStart(e); }, {passive:false});
        grid.addEventListener('touchmove', e => { e.preventDefault(); handleMove(e); }, {passive:false});
        window.addEventListener('touchend', handleEnd);
    </script>
</body>
</html>
