
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sopa Logos</title>
    <style>
        * { touch-action: none; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; margin: 0; overflow: hidden; }
        .header { background: #2e7d32; color: white; padding: 10px; font-weight: bold; display: flex; justify-content: space-around; align-items: center; }
        #grid { display: grid; grid-template-columns: repeat(15, 1fr); width: 98vw; max-width: 450px; background: #444; gap: 1px; margin: 5px auto; border: 2px solid #2e7d32; }
        .cell { aspect-ratio: 1/1; background: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 16px; color: #000; }
        .sel { background: #fff176 !important; }
        .found { background: #4caf50 !important; color: white !important; }
        #word-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 4px; padding: 10px; background: white; }
        .word-item { padding: 4px 8px; background: #eee; border-radius: 4px; font-size: 11px; border: 1px solid #ccc; }
        .word-found { background: #c8e6c9; color: #2e7d32; text-decoration: line-through; border-color: #2e7d32; }
        
        /* Publicidad y Ganador */
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; color: white; justify-content: center; align-items: center; flex-direction: column; }
        .ad-box { width: 300px; height: 250px; background: #fff; color: #333; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; border-radius: 10px; font-weight: bold; }
        .btn-action { background: #25D366; color: white; padding: 15px 30px; border-radius: 30px; text-decoration: none; font-weight: bold; border: none; cursor: pointer; font-size: 1rem; }
    </style>
</head>
<body>
    <div class="header">
        <span>LIBRERÍA LOGOS</span>
        <span id="score-display">Récord: 0</span>
    </div>
    <div id="grid"></div>
    <div id="word-list"><span class="word-item" id="w-KENNEDY">KENNEDY</span><span class="word-item" id="w-CRUZ">CRUZ</span><span class="word-item" id="w-LOGOS">LOGOS</span><span class="word-item" id="w-DIOS">DIOS</span><span class="word-item" id="w-CATEDRAL">CATEDRAL</span><span class="word-item" id="w-PULSERA">PULSERA</span><span class="word-item" id="w-SALMOS">SALMOS</span><span class="word-item" id="w-BIBLIA">BIBLIA</span><span class="word-item" id="w-AGENDA">AGENDA</span><span class="word-item" id="w-AMEN">AMEN</span><span class="word-item" id="w-LIBROS">LIBROS</span><span class="word-item" id="w-CRISTO">CRISTO</span><span class="word-item" id="w-AMOR">AMOR</span><span class="word-item" id="w-PAZ">PAZ</span></div>

    <div id="overlay">
        <h2 id="msg">¡EXCELENTE!</h2>
        <div class="ad-box">
            <!-- AQUÍ PUEDES PONER TU IMAGEN O SCRIPT DE PUB -->
            ESPACIO PUBLICITARIO<br>Librería Logos Kennedy
        </div>
        <button class="btn-action" onclick="location.reload()">SIGUIENTE SOPA</button>
        <p style="font-size: 12px; margin-top: 15px;">Visítanos: Calle 35C Sur No 78A-18</p>
    </div>

    <script>
        const wordsPos = {"KENNEDY": ["6-8", "7-9", "8-10", "9-11", "10-12", "11-13", "12-14"], "CRUZ": ["7-3", "8-4", "9-5", "10-6"], "LOGOS": ["12-4", "12-5", "12-6", "12-7", "12-8"], "DIOS": ["5-2", "6-3", "7-4", "8-5"], "CATEDRAL": ["7-5", "8-6", "9-7", "10-8", "11-9", "12-10", "13-11", "14-12"], "PULSERA": ["3-8", "3-9", "3-10", "3-11", "3-12", "3-13", "3-14"], "SALMOS": ["0-4", "0-5", "0-6", "0-7", "0-8", "0-9"], "BIBLIA": ["14-5", "14-6", "14-7", "14-8", "14-9", "14-10"], "AGENDA": ["5-9", "6-9", "7-9", "8-9", "9-9", "10-9"], "AMEN": ["10-9", "11-10", "12-11", "13-12"], "LIBROS": ["13-1", "13-2", "13-3", "13-4", "13-5", "13-6"], "CRISTO": ["7-1", "8-1", "9-1", "10-1", "11-1", "12-1"], "AMOR": ["1-3", "2-4", "3-5", "4-6"], "PAZ": ["8-2", "9-3", "10-4"]};
        const matrix = [["F", "X", "P", "C", "S", "A", "L", "M", "O", "S", "U", "Z", "E", "E", "I"], ["B", "X", "P", "A", "B", "P", "T", "Q", "A", "A", "Z", "E", "P", "S", "B"], ["F", "N", "Z", "I", "M", "L", "S", "W", "U", "N", "V", "Q", "A", "U", "W"], ["L", "T", "X", "U", "F", "O", "L", "H", "P", "U", "L", "S", "E", "R", "A"], ["Z", "K", "I", "M", "P", "F", "R", "I", "U", "B", "X", "N", "Z", "L", "R"], ["E", "F", "D", "A", "Y", "R", "U", "N", "A", "A", "L", "T", "S", "Q", "J"], ["C", "N", "S", "I", "C", "F", "F", "D", "K", "G", "Q", "V", "P", "Z", "Q"], ["X", "C", "D", "C", "O", "C", "C", "Z", "G", "E", "Y", "O", "N", "T", "O"], ["B", "R", "P", "E", "R", "S", "A", "V", "A", "N", "N", "O", "K", "C", "Q"], ["I", "I", "S", "A", "R", "U", "X", "T", "R", "D", "C", "N", "B", "J", "N"], ["S", "S", "G", "B", "Z", "Z", "Z", "R", "E", "A", "Z", "M", "E", "R", "Y"], ["J", "T", "F", "T", "U", "J", "B", "T", "D", "D", "M", "C", "G", "D", "K"], ["O", "O", "B", "M", "L", "O", "G", "O", "S", "I", "R", "E", "T", "X", "Y"], ["U", "L", "I", "B", "R", "O", "S", "P", "J", "C", "Z", "A", "N", "T", "H"], ["J", "N", "P", "K", "L", "B", "I", "B", "L", "I", "A", "H", "L", "D", "E"]];
        let activeCoords = [];
        let foundCount = 0;
        let isSelecting = false;
        
        // RECUPERAR RÉCORD
        let totalSolved = localStorage.getItem('logos_record') || 0;
        document.getElementById('score-display').textContent = "Récord: " + totalSolved;

        // SONIDO: Oscilador Web Audio API
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTone(freq, type, dur) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + dur);
        }

        const grid = document.getElementById('grid');
        matrix.forEach((row, r) => row.forEach((char, c) => {
            const div = document.createElement('div');
            div.className = 'cell'; div.textContent = char;
            div.dataset.pos = r + '-' + c;
            grid.appendChild(div);
        }));

        function handleTouch(e) {
            const t = e.touches ? e.touches[0] : e;
            const el = document.elementFromPoint(t.clientX, t.clientY);
            if (el && el.classList.contains('cell')) {
                const pos = el.dataset.pos;
                if (!activeCoords.includes(pos)) {
                    activeCoords.push(pos);
                    el.classList.add('sel');
                    playTone(600, 'sine', 0.1); 
                    checkWords();
                }
            }
        }

        grid.addEventListener('touchstart', (e) => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            isSelecting = true; activeCoords = []; handleTouch(e);
        });
        grid.addEventListener('touchmove', (e) => { if (isSelecting) handleTouch(e); });
        window.addEventListener('touchend', () => {
            isSelecting = false;
            document.querySelectorAll('.sel').forEach(c => c.classList.remove('sel'));
            activeCoords = [];
        });

        function checkWords() {
            for (let word in wordsPos) {
                const coords = wordsPos[word];
                if (coords.every(p => {
                    const el = document.querySelector(`[data-pos="${p}"]`);
                    return el.classList.contains('sel') || el.classList.contains('found');
                })) {
                    coords.forEach(p => document.querySelector(`[data-pos="${p}"]`).classList.add('found'));
                    const btn = document.getElementById('w-' + word);
                    if (btn && !btn.classList.contains('word-found')) {
                        btn.classList.add('word-found');
                        foundCount++;
                        playTone(1000, 'square', 0.3); // Sonido de palabra encontrada
                        if (foundCount === Object.keys(wordsPos).length) {
                            ganarJuego();
                        }
                    }
                }
            }
        }

        function ganarJuego() {
            totalSolved++;
            localStorage.setItem('logos_record', totalSolved);
            document.getElementById('overlay').style.display = 'flex';
            playTone(1200, 'sine', 0.6);
        }
    </script>
</body>
</html>
