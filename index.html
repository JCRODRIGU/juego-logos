
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sopa Logos</title>
    <style>
        * { touch-action: none; user-select: none; box-sizing: border-box; }
        body { font-family: sans-serif; margin: 0; background: #1a1a1a; height: 100vh; display: flex; flex-direction: column; color: white; }
        
        .header { background: #2e7d32; padding: 10px; font-weight: bold; display: flex; justify-content: space-between; flex-shrink: 0; border-bottom: 2px solid #1b5e20; }
        
        #game-area { flex: 0 0 auto; display: flex; justify-content: center; padding: 10px; background: #fff; }
        #grid { 
            display: grid; grid-template-columns: repeat(15, 1fr); 
            width: 92vw; max-width: 360px; aspect-ratio: 1/1;
            background: #444; gap: 1px; border: 3px solid #2e7d32;
        }
        .cell { background: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 12px; color: #000; }
        .sel { background: #fff176 !important; }
        .found { background: #4caf50 !important; color: white !important; }

        /* LISTA DE PALABRAS GARANTIZADA */
        #word-section { 
            flex: 1; overflow-y: auto; background: #f5f5f5; color: #333;
            padding: 15px; border-top: 4px solid #2e7d32;
        }
        #word-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; }
        .word-item { 
            padding: 6px 12px; background: white; border-radius: 20px; 
            font-size: 12px; border: 2px solid #ccc; font-weight: bold;
        }
        .word-found { background: #c8e6c9 !important; color: #1b5e20 !important; text-decoration: line-through; border-color: #2e7d32; }

        #victory-screen { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); 
            z-index: 100; flex-direction: column; align-items: center; justify-content: center; 
        }
        .btn-next { background: #4caf50; color: white; padding: 20px 50px; border-radius: 40px; border: none; font-weight: bold; font-size: 1.2rem; }
    </style>
</head>
<body>
    <div class="header">
        <span>LIBRERÍA LOGOS</span>
        <span id="record-tag">Nivel: 1</span>
    </div>

    <div id="game-area">
        <div id="grid"></div>
    </div>

    <div id="word-section">
        <div style="text-align: center; font-weight: bold; margin-bottom: 10px; color: #2e7d32; font-size: 14px;">PALABRAS A BUSCAR:</div>
        <div id="word-list"></div>
    </div>

    <div id="victory-screen">
        <h1 style="color: #4caf50;">¡LOGRADO!</h1>
        <div style="background: white; color: black; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px;">
            <p>Visítanos en <b>Kennedy Central</b><br>Bogotá, Colombia</p>
            <p>Mugs y Botilitos Personalizados</p>
        </div>
        <button class="btn-next" onclick="initGame()">SIGUIENTE SOPA</button>
    </div>

    <script>
        const pool = [];
        let usedWords = JSON.parse(localStorage.getItem('logos_used')) || [];
        let wordsPos = {}; let foundCount = 0; let activeCoords = []; let isSelecting = false;
        const TAMANO = 15;

        function initGame() {
            document.getElementById('victory-screen').style.display = 'none';
            document.getElementById('grid').innerHTML = '';
            document.getElementById('word-list').innerHTML = '';
            wordsPos = {}; foundCount = 0;
            
            let level = parseInt(localStorage.getItem('logos_level')) || 1;
            document.getElementById('record-tag').textContent = "Nivel: " + level;

            let available = pool.filter(w => !usedWords.includes(w));
            if (available.length < 10) { usedWords = []; available = pool; }
            const seleccionadas = available.sort(() => 0.5 - Math.random()).slice(0, 10);
            usedWords.push(...seleccionadas);
            localStorage.setItem('logos_used', JSON.stringify(usedWords.slice(-200)));

            let matriz = Array(TAMANO).fill().map(() => Array(TAMANO).fill(''));
            seleccionadas.forEach(palabra => {
                let colocada = false;
                for(let i=0; i<50; i++) {
                    if(colocada) break;
                    let dir = ['H','V','D'][Math.floor(Math.random()*3)];
                    let f = Math.floor(Math.random()*TAMANO);
                    let c = Math.floor(Math.random()*TAMANO);
                    if(dir==='H' && c+palabra.length > TAMANO) continue;
                    if(dir==='V' && f+palabra.length > TAMANO) continue;
                    if(dir==='D' && (f+palabra.length > TAMANO || c+palabra.length > TAMANO)) continue;
                    let coords = []; let puede = true;
                    for(let j=0; j<palabra.length; j++) {
                        let nf = f + (dir==='V' || dir==='D' ? j : 0);
                        let nc = c + (dir==='H' || dir==='D' ? j : 0);
                        if(matriz[nf][nc] !== '' && matriz[nf][nc] !== palabra[j]) { puede = false; break; }
                        coords.push(nf + '-' + nc);
                    }
                    if(puede) {
                        coords.forEach((co, idx) => { matriz[co.split('-')[0]][co.split('-')[1]] = palabra[idx]; });
                        wordsPos[palabra] = coords; colocada = true;
                    }
                }
            });

            const gridDiv = document.getElementById('grid');
            matriz.forEach((fila, r) => fila.forEach((char, c) => {
                const cell = document.createElement('div');
                cell.className = 'cell'; cell.textContent = char || String.fromCharCode(65 + Math.floor(Math.random()*26));
                cell.dataset.pos = r + '-' + c;
                gridDiv.appendChild(cell);
            }));

            const listDiv = document.getElementById('word-list');
            Object.keys(wordsPos).forEach(w => {
                const span = document.createElement('span');
                span.className = 'word-item'; span.id = 'w-' + w; span.textContent = w;
                listDiv.appendChild(span);
            });
        }

        function handleMove(e) {
            if (!isSelecting) return;
            const t = e.touches ? e.touches[0] : e;
            const el = document.elementFromPoint(t.clientX, t.clientY);
            if (el && el.classList.contains('cell')) {
                const pos = el.dataset.pos;
                if (!activeCoords.includes(pos)) {
                    activeCoords.push(pos); el.classList.add('sel');
                    checkWin();
                }
            }
        }

        const grid = document.getElementById('grid');
        grid.addEventListener('touchstart', (e) => { isSelecting = true; activeCoords = []; handleMove(e); e.preventDefault(); }, {passive:false});
        grid.addEventListener('touchmove', (e) => { handleMove(e); e.preventDefault(); }, {passive:false});
        window.addEventListener('touchend', () => {
            isSelecting = false;
            document.querySelectorAll('.sel').forEach(c => c.classList.remove('sel'));
        });

        function checkWin() {
            for (let word in wordsPos) {
                if (wordsPos[word].every(p => document.querySelector(`[data-pos="${p}"]`).classList.contains('sel') || document.querySelector(`[data-pos="${p}"]`).classList.contains('found'))) {
                    wordsPos[word].forEach(p => document.querySelector(`[data-pos="${p}"]`).classList.add('found'));
                    const item = document.getElementById('w-' + word);
                    if (item && !item.classList.contains('word-found')) {
                        item.classList.add('word-found'); foundCount++;
                        if (foundCount === Object.keys(wordsPos).length) {
                            localStorage.setItem('logos_level', (parseInt(localStorage.getItem('logos_level')) || 1) + 1);
                            setTimeout(() => document.getElementById('victory-screen').style.display = 'flex', 300);
                        }
                    }
                }
            }
        }
        initGame();
    </script>
</body>
</html>
