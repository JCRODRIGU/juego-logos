            margin: 0; 
            overflow: hidden; 
            height: 100vh;
            display: flex;
            flex-direction: column;

        .header { 
            background: #2e7d32; 
            color: white; 
            padding: 12px; 
            font-weight: bold; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        #verse-container {
            background: #e8f5e9;
            padding: 15px;
            margin: 8px;
            border-radius: 12px;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid #c8e6c9;
        }

        #verse-text {
            font-weight: bold;
            color: #1b5e20;
            font-size: 1.1em;
            line-height: 1.3;
        }

        #grid { 
            display: grid; 
            grid-template-columns: repeat(12, 1fr); 
            width: 96vw; 
            max-width: 440px; 
            background: #2e7d32; 
            gap: 1px; 
            margin: 0 auto; 
            border: 2px solid #2e7d32;
        }

        .cell { 
            aspect-ratio: 1/1; 
            background: white; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: bold; 
            font-size: 16px; 
            text-transform: uppercase; 
        }

        .sel { background: #fff176 !important; }
        .found { background: #c8e6c9 !important; color: #1b5e20 !important; }

        #word-list { 
            flex: 1;
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 5px; 
            padding: 10px; 
            overflow-y: auto; 
            background: #f5f5f5;
        }

        .word-item { 
            padding: 4px 8px; 
            background: white; 
            border-radius: 10px; 
            font-size: 11px; 
            font-weight: bold; 
            color: #2e7d32; 
            border: 1px solid #2e7d32; 
        }

        .word-found { 
            background: #2e7d32 !important; 
            color: white !important; 
            text-decoration: line-through; 
        }

        #overlay { 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: #2e7d32; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            z-index: 1000; 
            color: white; 
        }

        .modal { 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); 
            display: none; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            z-index: 2000; 
        }

        .card { 
            background: white; 
            padding: 25px; 
            border-radius: 20px; 
            width: 90%; 
            max-width: 360px; 
            text-align: center; 
        }
    </style>
</head>
<body>

        <h1>LIBRERÍA CRISTIANA LOGOS</h1>
        <button onclick="iniciar()" style="padding:20px 40px; border-radius:50px; border:none; font-weight:bold; font-size:1.3em; cursor:pointer;">EMPEZAR RETO</button>
    </div>

    <div id="modal" class="modal">
        <div class="card">
            <h2 style="color:#2e7d32">¡NIVEL COMPLETADO!</h2>
            <img id="ad-img" src="" style="width:100%; height:180px; object-fit:contain;">
            <p id="ad-txt" style="font-weight:bold;"></p>
            <h3 id="ad-price" style="color:red; font-size:1.6em;"></h3>
            <button onclick="siguiente()" style="width:100%; padding:18px; background:#2e7d32; color:white; border:none; border-radius:30px; font-weight:bold; cursor:pointer;">SIGUIENTE</button>
            <div style="font-size:0.8em; margin-top:15px; color:#666;">Calle 35C Sur No 78A-18 Kennedy Central Bogota</div>
        </div>
    </div>

    <div class="header" id="lvl-tag">NIVEL 1</div>
    <div id="verse-container">
        <div id="verse-text"></div>
    </div>
    <div id="grid"></div>
    <div id="word-list"></div>

    <script>

otros, quien contra nosotros?", "r": "Romanos 8:31"}, {"v": "Bienaventurados los pacificadores, porque ellos seran llamados hijos de Dios.", "r": "Mateo 5:9"}, {"v": "Es, pues, la fe la certeza de lo que se espera, la conviccion de lo que no se ve.", "r": "Hebreos 11:1"}];
        const anuncios = [{"img": "publicidad1.jpg", "txt": "BIBLIA DE ESTUDIO DIARIO VIVIR PARA JOVENES NTV", "precio": "$220.000"}, {"img": "publicidad2.jpg", "txt": "LA BIBLIA PASTORAL", "precio": "$200.000"}, {"img": "publicidad3.jpg", "txt": "BIBLIA LEON RVR1960", "precio": "$160.000"}];

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playOriginalTone(f, d) {
            if (!audioCtx) return;
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = 'sine'; o.frequency.setValueAtTime(f, audioCtx.currentTime);
            g.gain.setValueAtTime(0.1, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + d);
        }

        function soundSelect() { playOriginalTone(100, 0.1); } 
        function soundSuccess() { playOriginalTone(300, 0.4); }

            initAudio();

            generarTablero(p);
        }

                let puesta = false;
                for(let i=0; i<1000 && !puesta; i++) {
                    let [dr, dc] = dirs[Math.floor(Math.random()*dirs.length)];
                    let r = Math.floor(Math.random()*TAM), c = Math.floor(Math.random()*TAM);
                    if (r + dr*(palabra.length-1) < 0 || r + dr*(palabra.length-1) >= TAM || c + dc*(palabra.length-1) < 0 || c + dc*(palabra.length-1) >= TAM) continue;
                    let ok = true;
                    for(let j=0; j<palabra.length; j++) if(matriz[r+dr*j][c+dc*j] !== '' && matriz[r+dr*j][c+dc*j] !== palabra[j]) ok=false;

                        for(let j=0; j<palabra.length; j++) { matriz[r+dr*j][c+dc*j] = palabra[j]; wordsPos[palabra].push(`${r+dr*j}-${c+dc*j}`); }
                        puesta = true;
                    }
                }
            });

                for(let c=0; c<TAM; c++) {
                    const d = document.createElement('div');

                    d.dataset.pos = `${r}-${c}`; grid.appendChild(d);
                }
            }
            palabras.forEach(w => {
                if (wordsPos[w]) {
                    const s = document.createElement('span'); s.className = 'word-item'; s.id = 'w-'+w; s.textContent = w; list.appendChild(s);
                }
            });
        }

        function handleTouch(e) {
            const t = e.touches ? e.touches[0] : e;
            const el = document.elementFromPoint(t.clientX, t.clientY);
            if(el && el.dataset.pos && isSelecting) {
                if(!activeCoords.includes(el.dataset.pos)) {
                    activeCoords.push(el.dataset.pos); el.classList.add('sel');
                    soundSelect(); check();
                }
            }
        }

        document.getElementById('grid').addEventListener('touchstart', (e) => { isSelecting = true; activeCoords = []; handleTouch(e); }, {passive: false});
        document.getElementById('grid').addEventListener('touchmove', (e) => { e.preventDefault(); handleTouch(e); }, {passive: false});
        window.addEventListener('touchend', () => { document.querySelectorAll('.sel').forEach(c => c.classList.remove('sel')); isSelecting = false; });

        function check() {
            for(let w in wordsPos) {
                const itm = document.getElementById('w-'+w);
                if(itm && !itm.classList.contains('word-found') && wordsPos[w].every(p => {
                    const cell = document.querySelector(`[data-pos="${p}"]`);
                    return cell && (cell.classList.contains('sel') || cell.classList.contains('found'));
                })) {
                    wordsPos[w].forEach(p => document.querySelector(`[data-pos="${p}"]`).classList.add('found'));
                    itm.classList.add('word-found'); soundSuccess(); foundCount++;
                    if(foundCount === Object.keys(wordsPos).length) setTimeout(ganar, 600);
                }
            }
        }

        function ganar() {
            const a = anuncios[Math.floor(Math.random()*anuncios.length)];
            document.getElementById('ad-img').src = a.img;
            document.getElementById('ad-txt').textContent = a.txt;
            document.getElementById('ad-price').textContent = a.precio;
            document.getElementById('modal').style.display = 'flex';
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        }

        function siguiente() {
            document.getElementById('modal').style.display = 'none';
            nivelActual = (nivelActual + 1) % niveles.length;
            cargarNivel();
        }
    </script>
</body>

                    let [dr, dc] = dirs[Math.floor(Math.random()*dirs.length)];
                    let r = Math.floor(Math.random()*TAM), c = Math.floor(Math.random()*TAM);
                    if (r + dr*(palabra.length-1) < 0 || r + dr*(palabra.length-1) >= TAM || c + dc*(palabra.length-1) < 0 || c + dc*(palabra.length-1) >= TAM) continue;
                    let ok = true;
                    for(let j=0; j<palabra.length; j++) if(matriz[r+dr*j][c+dc*j] !== '' && matriz[r+dr*j][c+dc*j] !== palabra[j]) ok=false;
                    if(ok) {
                        wordsPos[palabra] = [];
                        for(let j=0; j<palabra.length; j++) { matriz[r+dr*j][c+dc*j] = palabra[j]; wordsPos[palabra].push(`${r+dr*j}-${c+dc*j}`); }
                        puesta = true;
                    }
                }
            });

            for(let r=0; r<TAM; r++) {
                for(let c=0; c<TAM; c++) {
                    const d = document.createElement('div');
                    d.className = 'cell'; d.textContent = matriz[r][c] || String.fromCharCode(65+Math.floor(Math.random()*26));
                    d.dataset.pos = `${r}-${c}`; grid.appendChild(d);
                }
            }
            palabras.forEach(w => {
                if (wordsPos[w]) {
                    const s = document.createElement('span'); s.className = 'word-item'; s.id = 'w-'+w; s.textContent = w; list.appendChild(s);
                }
            });
        }

        function handleTouch(e) {
            const t = e.touches ? e.touches[0] : e;
            const el = document.elementFromPoint(t.clientX, t.clientY);
            if(el && el.dataset.pos && isSelecting) {
                if(!activeCoords.includes(el.dataset.pos)) {
                    activeCoords.push(el.dataset.pos); el.classList.add('sel');
                    soundSelect(); check();
                }
            }
        }

        document.getElementById('grid').addEventListener('touchstart', (e) => { isSelecting = true; activeCoords = []; handleTouch(e); }, {passive: false});
        document.getElementById('grid').addEventListener('touchmove', (e) => { e.preventDefault(); handleTouch(e); }, {passive: false});
        window.addEventListener('touchend', () => { document.querySelectorAll('.sel').forEach(c => c.classList.remove('sel')); isSelecting = false; });

        function check() {
            for(let w in wordsPos) {
                const itm = document.getElementById('w-'+w);
                if(itm && !itm.classList.contains('word-found') && wordsPos[w].every(p => {
                    const cell = document.querySelector(`[data-pos="${p}"]`);
                    return cell && (cell.classList.contains('sel') || cell.classList.contains('found'));
                })) {
                    wordsPos[w].forEach(p => document.querySelector(`[data-pos="${p}"]`).classList.add('found'));
                    itm.classList.add('word-found'); soundSuccess(); foundCount++;
                    if(foundCount === Object.keys(wordsPos).length) setTimeout(ganar, 600);
                }
            }
        }

        function ganar() {
            const a = anuncios[Math.floor(Math.random()*anuncios.length)];
            document.getElementById('ad-img').src = a.img;
            document.getElementById('ad-txt').textContent = a.txt;
            document.getElementById('ad-price').textContent = a.precio;
            document.getElementById('modal').style.display = 'flex';
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        }

        function siguiente() {
            document.getElementById('modal').style.display = 'none';
            nivelActual = (nivelActual + 1) % niveles.length;
            cargarNivel();
        }
    </script>
</body>
