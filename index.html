
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sopa Logos</title>
    <style>
        * { touch-action: none; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { font-family: sans-serif; text-align: center; background: #fff; margin: 0; overflow: hidden; }
        .header { background: #2e7d32; color: white; padding: 10px; font-weight: bold; }
        #grid { 
            display: grid; grid-template-columns: repeat(15, 1fr); 
            width: 98vw; max-width: 450px; background: #444; gap: 1px; margin: 5px auto;
        }
        .cell { 
            aspect-ratio: 1/1; background: white; display: flex; align-items: center; 
            justify-content: center; font-weight: bold; font-size: 16px; color: #000;
        }
        .sel { background: #fff176 !important; }
        .found { background: #4caf50 !important; color: white !important; }
        #word-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 4px; padding: 10px; }
        .word-item { padding: 4px 8px; background: #eee; border-radius: 4px; font-size: 11px; border: 1px solid #ccc; }
        .word-found { background: #c8e6c9; color: #2e7d32; text-decoration: line-through; border-color: #2e7d32; }
        .win { display: none; background: #25D366; color: white; padding: 15px; border-radius: 30px; text-decoration: none; font-weight: bold; margin: 10px; display: inline-block; }
    </style>
</head>
<body>
    <div class="header">LIBRERÍA LOGOS</div>
    <div id="grid"></div>
    <div id="word-list"><span class="word-item" id="w-LOGOS">LOGOS</span><span class="word-item" id="w-SALMOS">SALMOS</span><span class="word-item" id="w-AGENDA">AGENDA</span><span class="word-item" id="w-PAZ">PAZ</span><span class="word-item" id="w-CRISTO">CRISTO</span><span class="word-item" id="w-KENNEDY">KENNEDY</span><span class="word-item" id="w-LIBROS">LIBROS</span><span class="word-item" id="w-AMEN">AMEN</span><span class="word-item" id="w-DIOS">DIOS</span><span class="word-item" id="w-PULSERA">PULSERA</span><span class="word-item" id="w-CRUZ">CRUZ</span><span class="word-item" id="w-AMOR">AMOR</span><span class="word-item" id="w-CATEDRAL">CATEDRAL</span><span class="word-item" id="w-BIBLIA">BIBLIA</span></div>
    <a href="https://wa.me/573125756581?text=Gane" id="win-btn" style="display:none" class="win">✅ RECLAMAR PREMIO</a>

    <script>
        const wordsPos = {"LOGOS": ["14-10", "14-11", "14-12", "14-13", "14-14"], "SALMOS": ["2-8", "3-9", "4-10", "5-11", "6-12", "7-13"], "AGENDA": ["7-8", "8-8", "9-8", "10-8", "11-8", "12-8"], "PAZ": ["7-6", "8-6", "9-6"], "CRISTO": ["1-7", "1-8", "1-9", "1-10", "1-11", "1-12"], "KENNEDY": ["1-5", "2-5", "3-5", "4-5", "5-5", "6-5", "7-5"], "LIBROS": ["8-13", "9-13", "10-13", "11-13", "12-13", "13-13"], "AMEN": ["0-5", "1-6", "2-7", "3-8"], "DIOS": ["6-2", "7-3", "8-4", "9-5"], "PULSERA": ["8-1", "9-2", "10-3", "11-4", "12-5", "13-6", "14-7"], "CRUZ": ["8-11", "9-11", "10-11", "11-11"], "AMOR": ["4-11", "5-12", "6-13", "7-14"], "CATEDRAL": ["6-1", "7-2", "8-3", "9-4", "10-5", "11-6", "12-7", "13-8"], "BIBLIA": ["7-10", "8-10", "9-10", "10-10", "11-10", "12-10"]};
        const matrix = [["G", "O", "I", "I", "S", "A", "L", "V", "F", "X", "R", "I", "C", "W", "D"], ["O", "N", "Q", "B", "V", "K", "M", "C", "R", "I", "S", "T", "O", "D", "M"], ["S", "R", "M", "I", "H", "E", "I", "E", "S", "T", "L", "I", "Y", "X", "K"], ["G", "I", "Z", "I", "Y", "N", "U", "U", "N", "A", "U", "U", "D", "R", "B"], ["O", "B", "V", "E", "V", "N", "M", "E", "Q", "Q", "L", "A", "V", "C", "G"], ["G", "E", "Y", "R", "S", "E", "F", "A", "A", "A", "R", "M", "M", "T", "I"], ["L", "C", "D", "G", "T", "D", "Q", "G", "B", "P", "V", "Z", "O", "O", "Q"], ["I", "T", "A", "I", "L", "Y", "P", "P", "A", "O", "B", "U", "T", "S", "R"], ["F", "P", "M", "T", "O", "P", "A", "U", "G", "L", "I", "C", "J", "L", "Q"], ["K", "G", "U", "W", "E", "S", "Z", "S", "E", "V", "B", "R", "O", "I", "H"], ["T", "O", "V", "L", "J", "D", "T", "W", "N", "I", "L", "U", "G", "B", "S"], ["I", "F", "Y", "C", "S", "E", "R", "N", "D", "C", "I", "Z", "O", "R", "C"], ["K", "S", "Y", "F", "Q", "E", "K", "A", "A", "P", "A", "Z", "Z", "O", "P"], ["Y", "E", "Y", "W", "Q", "B", "R", "Z", "L", "P", "Y", "H", "V", "S", "G"], ["A", "O", "Z", "X", "L", "G", "S", "A", "Z", "F", "L", "O", "G", "O", "S"]];
        let activeCoords = [];
        let foundCount = 0;
        let isSelecting = false;

        // MOTOR DE SONIDO ARREGLADO
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playBeep(f, d) {
            if (!audioCtx) return;
            const o = audioCtx.createOscillator(); 
            const g = audioCtx.createGain();
            o.frequency.setValueAtTime(f, audioCtx.currentTime);
            o.type = 'sine';
            g.gain.setValueAtTime(0.1, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
            o.connect(g); 
            g.connect(audioCtx.destination); 
            o.start(); 
            o.stop(audioCtx.currentTime + d);
        }

        const grid = document.getElementById('grid');
        matrix.forEach((row, r) => row.forEach((char, c) => {
            const div = document.createElement('div');
            div.className = 'cell'; div.textContent = char;
            div.dataset.pos = r + '-' + c;
            grid.appendChild(div);
        }));

        function handleTouch(e) {
            const t = e.touches ? e.touches[0] : e;
            const el = document.elementFromPoint(t.clientX, t.clientY);
            if (el && el.classList.contains('cell')) {
                const pos = el.dataset.pos;
                if (!activeCoords.includes(pos)) {
                    activeCoords.push(pos);
                    el.classList.add('sel');
                    playBeep(440, 0.1); // Sonido de letra
                    checkWords();
                }
            }
        }

        grid.addEventListener('touchstart', (e) => {
            initAudio(); // Desbloquea el sonido en el primer toque
            isSelecting = true;
            activeCoords = [];
            handleTouch(e);
        });

        grid.addEventListener('touchmove', (e) => {
            if (isSelecting) handleTouch(e);
        });

        window.addEventListener('touchend', () => {
            isSelecting = false;
            document.querySelectorAll('.sel').forEach(c => c.classList.remove('sel'));
            activeCoords = [];
        });

        function checkWords() {
            for (let word in wordsPos) {
                const coords = wordsPos[word];
                if (coords.every(p => {
                    const el = document.querySelector(`[data-pos="${p}"]`);
                    return el.classList.contains('sel') || el.classList.contains('found');
                })) {
                    coords.forEach(p => {
                        const el = document.querySelector(`[data-pos="${p}"]`);
                        el.classList.add('found');
                    });
                    const btn = document.getElementById('w-' + word);
                    if (btn && !btn.classList.contains('word-found')) {
                        btn.classList.add('word-found');
                        foundCount++;
                        playBeep(600, 0.4); // Sonido de palabra encontrada (más largo)
                        if (foundCount === Object.keys(wordsPos).length) document.getElementById('win-btn').style.display = 'block';
                    }
                }
            }
        }
    </script>
</body>
</html>
