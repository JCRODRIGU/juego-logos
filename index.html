
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reto Bíblico Logos</title>
    <style>
        * { touch-action: none; user-select: none; box-sizing: border-box; }
        body { font-family: sans-serif; text-align: center; background: #ffffff; margin: 0; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #2e7d32; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .btn-start { padding: 15px 35px; background: white; color: #2e7d32; border-radius: 30px; font-size: 1.2em; border: none; font-weight: bold; }
        .header { background: #2e7d32; color: white; padding: 15px; font-weight: bold; }
        #grid { display: grid; grid-template-columns: repeat(15, 1fr); width: 98vw; max-width: 460px; background: #ccc; gap: 1px; margin: 10px auto; border: 2px solid #2e7d32; }
        .cell { aspect-ratio: 1/1; background: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; color: #000; }
        .sel { background: #fff176 !important; }
        .found { background: #c8e6c9 !important; color: #1b5e20 !important; }
        #word-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; padding: 10px; }
        .word-item { padding: 5px 10px; background: #f0f0f0; border-radius: 10px; font-size: 11px; color: #666; border: 1px solid #ddd; }
        .word-found { background: #2e7d32; color: white; text-decoration: line-through; }
        .win { display: none; background: #25D366; color: white; padding: 15px; border-radius: 30px; text-decoration: none; font-weight: bold; margin: 10px; display: inline-block; }
    </style>
</head>
<body>
    <div id="overlay">
        <button class="btn-start" onclick="iniciarJuego()">INICIAR RETO</button>
    </div>
    <div class="header">LIBRERÍA CRISTIANA LOGOS</div>
    <div id="grid"></div>
    <div id="word-list"><span class="word-item" id="w-BIBLIA">BIBLIA</span><span class="word-item" id="w-CRISTIANO">CRISTIANO</span><span class="word-item" id="w-BIBLICO">BIBLICO</span><span class="word-item" id="w-VIDA">VIDA</span><span class="word-item" id="w-PAN">PAN</span><span class="word-item" id="w-MATRIMONIO">MATRIMONIO</span><span class="word-item" id="w-REINA">REINA</span><span class="word-item" id="w-LOGOS">LOGOS</span><span class="word-item" id="w-BOTILITO">BOTILITO</span><span class="word-item" id="w-CAMISETA">CAMISETA</span><span class="word-item" id="w-LIBRO">LIBRO</span><span class="word-item" id="w-1960">1960</span><span class="word-item" id="w-ORACION">ORACION</span><span class="word-item" id="w-MUJER">MUJER</span><span class="word-item" id="w-SUBLIMADO">SUBLIMADO</span></div>
    <a href="https://wa.me/573125756581?text=Gane" id="win-btn" class="win">✅ RECLAMAR PREMIO</a>

    <script>
        const wordsPos = {"BIBLIA": ["3-8", "4-9", "5-10", "6-11", "7-12", "8-13"], "CRISTIANO": ["4-4", "4-5", "4-6", "4-7", "4-8", "4-9", "4-10", "4-11", "4-12"], "BIBLICO": ["4-0", "5-1", "6-2", "7-3", "8-4", "9-5", "10-6"], "VIDA": ["6-7", "7-8", "8-9", "9-10"], "PAN": ["8-8", "9-9", "10-10"], "MATRIMONIO": ["0-2", "1-3", "2-4", "3-5", "4-6", "5-7", "6-8", "7-9", "8-10", "9-11"], "REINA": ["10-7", "11-8", "12-9", "13-10", "14-11"], "LOGOS": ["4-1", "5-2", "6-3", "7-4", "8-5"], "BOTILITO": ["1-5", "1-6", "1-7", "1-8", "1-9", "1-10", "1-11", "1-12"], "CAMISETA": ["4-2", "5-3", "6-4", "7-5", "8-6", "9-7", "10-8", "11-9"], "LIBRO": ["11-2", "11-3", "11-4", "11-5", "11-6"], "1960": ["10-0", "11-0", "12-0", "13-0"], "ORACION": ["2-1", "3-2", "4-3", "5-4", "6-5", "7-6", "8-7"], "MUJER": ["0-6", "0-7", "0-8", "0-9", "0-10"], "SUBLIMADO": ["6-14", "7-14", "8-14", "9-14", "10-14", "11-14", "12-14", "13-14", "14-14"]};
        const matrix = [["Y", "F", "M", "Q", "D", "H", "M", "U", "J", "E", "R", "X", "N", "Z", "J"], ["M", "H", "R", "A", "S", "B", "O", "T", "I", "L", "I", "T", "O", "E", "P"], ["M", "O", "R", "N", "T", "W", "W", "N", "J", "B", "S", "Q", "P", "Y", "Z"], ["E", "N", "R", "L", "P", "R", "R", "P", "B", "U", "M", "H", "Z", "O", "E"], ["B", "L", "C", "A", "C", "R", "I", "S", "T", "I", "A", "N", "O", "V", "V"], ["O", "I", "O", "A", "C", "B", "Y", "M", "G", "M", "B", "K", "K", "S", "U"], ["D", "F", "B", "G", "M", "I", "S", "V", "O", "E", "P", "L", "K", "A", "S"], ["X", "O", "B", "L", "O", "I", "O", "D", "I", "N", "Y", "L", "I", "R", "U"], ["P", "M", "P", "W", "I", "S", "S", "N", "P", "D", "I", "E", "J", "A", "B"], ["S", "C", "P", "E", "P", "C", "N", "E", "L", "A", "A", "O", "V", "E", "L"], ["1", "P", "R", "V", "O", "E", "O", "R", "T", "P", "N", "R", "R", "W", "I"], ["9", "V", "L", "I", "B", "R", "O", "K", "E", "A", "L", "X", "U", "Q", "M"], ["6", "K", "N", "S", "O", "Z", "O", "S", "K", "I", "V", "K", "A", "W", "A"], ["0", "G", "M", "D", "E", "D", "T", "T", "R", "V", "N", "J", "A", "L", "D"], ["Y", "A", "L", "M", "Q", "C", "B", "T", "O", "X", "T", "A", "E", "M", "O"]];
        let activeCoords = []; let foundCount = 0; let isSelecting = false;
        let audioCtx;

        function iniciarJuego() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            document.getElementById('overlay').style.display = 'none';
        }

        // --- EFECTO EXACTO VERSIÓN ANCLA ---
        function playAnclaSound(f, d) {
            if (!audioCtx) return;
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.type = 'sine'; // Onda suave original
            o.frequency.setValueAtTime(f, audioCtx.currentTime);
            g.gain.setValueAtTime(0.1, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + d);
        }

        const grid = document.getElementById('grid');
        matrix.forEach((row, r) => row.forEach((char, c) => {
            const div = document.createElement('div');
            div.className = 'cell'; div.textContent = char;
            div.dataset.pos = r + '-' + c;
            grid.appendChild(div);
        }));

        function handleTouch(e) {
            const t = e.touches ? e.touches[0] : e;
            const el = document.elementFromPoint(t.clientX, t.clientY);
            if (el && el.classList.contains('cell')) {
                const pos = el.dataset.pos;
                if (!activeCoords.includes(pos)) {
                    activeCoords.push(pos); el.classList.add('sel');
                    playAnclaSound(440, 0.1); // El "click" sutil original
                    checkWords();
                }
            }
        }

        grid.addEventListener('touchstart', (e) => { isSelecting = true; activeCoords = []; handleTouch(e); });
        grid.addEventListener('touchmove', (e) => { if (isSelecting) handleTouch(e); });
        window.addEventListener('touchend', () => {
            document.querySelectorAll('.sel').forEach(c => c.classList.remove('sel'));
            isSelecting = false;
        });

        function checkWords() {
            for (let word in wordsPos) {
                const coords = wordsPos[word];
                if (coords.every(p => {
                    const el = document.querySelector(`[data-pos="${p}"]`);
                    return el.classList.contains('sel') || el.classList.contains('found');
                })) {
                    const btn = document.getElementById('w-' + word);
                    if (btn && !btn.classList.contains('word-found')) {
                        coords.forEach(p => document.querySelector(`[data-pos="${p}"]`).classList.add('found'));
                        btn.classList.add('word-found'); 
                        foundCount++;
                        playAnclaSound(523, 0.2); // El sonido de palabra completada original
                        if (foundCount === Object.keys(wordsPos).length) document.getElementById('win-btn').style.display = 'block';
                    }
                }
            }
        }
    </script>
</body>
</html>
