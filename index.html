
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sopa Logos</title>
    <style>
        * { touch-action: none; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { font-family: sans-serif; text-align: center; background: #fff; margin: 0; overflow: hidden; }
        .header { background: #2e7d32; color: white; padding: 10px; font-weight: bold; }
        #grid { 
            display: grid; grid-template-columns: repeat(15, 1fr); 
            width: 98vw; max-width: 450px; background: #444; gap: 1px; margin: 5px auto;
        }
        .cell { 
            aspect-ratio: 1/1; background: white; display: flex; align-items: center; 
            justify-content: center; font-weight: bold; font-size: 16px; color: #000;
        }
        .sel { background: #fff176 !important; }
        .found { background: #4caf50 !important; color: white !important; }
        #word-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 4px; padding: 10px; }
        .word-item { padding: 4px 8px; background: #eee; border-radius: 4px; font-size: 11px; border: 1px solid #ccc; }
        .word-found { background: #c8e6c9; color: #2e7d32; text-decoration: line-through; border-color: #2e7d32; }
        .win { display: none; background: #25D366; color: white; padding: 15px; border-radius: 30px; text-decoration: none; font-weight: bold; margin: 10px; display: inline-block; }
    </style>
</head>
<body>
    <div class="header">LIBRERÍA LOGOS</div>
    <div id="grid"></div>
    <div id="word-list"><span class="word-item" id="w-CRISTO">CRISTO</span><span class="word-item" id="w-AGENDA">AGENDA</span><span class="word-item" id="w-BIBLIA">BIBLIA</span><span class="word-item" id="w-AMEN">AMEN</span><span class="word-item" id="w-CATEDRAL">CATEDRAL</span><span class="word-item" id="w-DIOS">DIOS</span><span class="word-item" id="w-LOGOS">LOGOS</span><span class="word-item" id="w-LIBROS">LIBROS</span><span class="word-item" id="w-PAZ">PAZ</span><span class="word-item" id="w-PULSERA">PULSERA</span><span class="word-item" id="w-AMOR">AMOR</span><span class="word-item" id="w-KENNEDY">KENNEDY</span><span class="word-item" id="w-CRUZ">CRUZ</span><span class="word-item" id="w-SALMOS">SALMOS</span></div>
    <a href="https://wa.me/573125756581?text=Gane" id="win-btn" style="display:none" class="win">✅ RECLAMAR PREMIO</a>

    <script>
        const wordsPos = {"CRISTO": ["4-2", "4-3", "4-4", "4-5", "4-6", "4-7"], "AGENDA": ["7-6", "7-7", "7-8", "7-9", "7-10", "7-11"], "BIBLIA": ["2-11", "3-11", "4-11", "5-11", "6-11", "7-11"], "AMEN": ["13-6", "13-7", "13-8", "13-9"], "CATEDRAL": ["6-3", "7-4", "8-5", "9-6", "10-7", "11-8", "12-9", "13-10"], "DIOS": ["6-2", "7-2", "8-2", "9-2"], "LOGOS": ["4-13", "5-13", "6-13", "7-13", "8-13"], "LIBROS": ["2-1", "3-1", "4-1", "5-1", "6-1", "7-1"], "PAZ": ["2-7", "3-8", "4-9"], "PULSERA": ["0-3", "0-4", "0-5", "0-6", "0-7", "0-8", "0-9"], "AMOR": ["2-5", "3-6", "4-7", "5-8"], "KENNEDY": ["6-4", "6-5", "6-6", "6-7", "6-8", "6-9", "6-10"], "CRUZ": ["10-14", "11-14", "12-14", "13-14"], "SALMOS": ["4-14", "5-14", "6-14", "7-14", "8-14", "9-14"]};
        const matrix = [["R", "P", "K", "P", "U", "L", "S", "E", "R", "A", "N", "C", "C", "V", "B"], ["E", "T", "U", "C", "H", "C", "N", "U", "G", "U", "U", "A", "V", "G", "R"], ["V", "L", "M", "L", "D", "A", "J", "P", "B", "M", "W", "B", "J", "Z", "Q"], ["O", "I", "Y", "C", "D", "W", "M", "T", "A", "Q", "H", "I", "J", "D", "M"], ["V", "B", "C", "R", "I", "S", "T", "O", "G", "Z", "T", "B", "P", "L", "S"], ["X", "R", "G", "Z", "F", "L", "W", "X", "R", "Q", "I", "L", "I", "O", "A"], ["M", "O", "D", "C", "K", "E", "N", "N", "E", "D", "Y", "I", "C", "G", "L"], ["T", "S", "I", "V", "A", "X", "A", "G", "E", "N", "D", "A", "S", "O", "M"], ["O", "B", "O", "U", "R", "T", "X", "J", "H", "R", "Y", "A", "Y", "S", "O"], ["B", "N", "S", "T", "M", "M", "E", "Z", "T", "R", "Y", "B", "F", "Q", "S"], ["I", "I", "A", "C", "M", "T", "E", "D", "Q", "Q", "S", "X", "N", "V", "C"], ["T", "P", "N", "U", "R", "N", "C", "W", "R", "R", "D", "N", "I", "X", "R"], ["Z", "R", "G", "M", "R", "Q", "R", "A", "S", "A", "O", "U", "Q", "E", "U"], ["O", "B", "P", "W", "E", "B", "A", "M", "E", "N", "L", "A", "M", "J", "Z"], ["Y", "F", "H", "B", "T", "C", "C", "H", "M", "Z", "X", "C", "R", "E", "A"]];
        let activeCoords = [];
        let foundCount = 0;
        let isSelecting = false;

        // MOTOR DE SONIDO ARREGLADO
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playBeep(f, d) {
            if (!audioCtx) return;
            const o = audioCtx.createOscillator(); 
            const g = audioCtx.createGain();
            o.frequency.setValueAtTime(f, audioCtx.currentTime);
            o.type = 'sine';
            g.gain.setValueAtTime(0.1, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
            o.connect(g); 
            g.connect(audioCtx.destination); 
            o.start(); 
            o.stop(audioCtx.currentTime + d);
        }

        const grid = document.getElementById('grid');
        matrix.forEach((row, r) => row.forEach((char, c) => {
            const div = document.createElement('div');
            div.className = 'cell'; div.textContent = char;
            div.dataset.pos = r + '-' + c;
            grid.appendChild(div);
        }));

        function handleTouch(e) {
            const t = e.touches ? e.touches[0] : e;
            const el = document.elementFromPoint(t.clientX, t.clientY);
            if (el && el.classList.contains('cell')) {
                const pos = el.dataset.pos;
                if (!activeCoords.includes(pos)) {
                    activeCoords.push(pos);
                    el.classList.add('sel');
                    playBeep(440, 0.1); // Sonido de letra
                    checkWords();
                }
            }
        }

        grid.addEventListener('touchstart', (e) => {
            initAudio(); // Desbloquea el sonido en el primer toque
            isSelecting = true;
            activeCoords = [];
            handleTouch(e);
        });

        grid.addEventListener('touchmove', (e) => {
            if (isSelecting) handleTouch(e);
        });

        window.addEventListener('touchend', () => {
            isSelecting = false;
            document.querySelectorAll('.sel').forEach(c => c.classList.remove('sel'));
            activeCoords = [];
        });

        function checkWords() {
            for (let word in wordsPos) {
                const coords = wordsPos[word];
                if (coords.every(p => {
                    const el = document.querySelector(`[data-pos="${p}"]`);
                    return el.classList.contains('sel') || el.classList.contains('found');
                })) {
                    coords.forEach(p => {
                        const el = document.querySelector(`[data-pos="${p}"]`);
                        el.classList.add('found');
                    });
                    const btn = document.getElementById('w-' + word);
                    if (btn && !btn.classList.contains('word-found')) {
                        btn.classList.add('word-found');
                        foundCount++;
                        playBeep(600, 0.4); // Sonido de palabra encontrada (más largo)
                        if (foundCount === Object.keys(wordsPos).length) document.getElementById('win-btn').style.display = 'block';
                    }
                }
            }
        }
    </script>
</body>
</html>
