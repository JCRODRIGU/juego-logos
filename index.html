
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Librería Logos - Reto</title>
    <style>
        body { font-family: 'Arial', sans-serif; background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; margin: 0; touch-action: none; }
        h3 { color: #4caf50; margin: 15px 0; text-shadow: 1px 1px 2px black; }
        #grid { 
            display: grid; grid-template-columns: repeat(15, 1fr); gap: 1px; 
            width: 98vw; max-width: 500px; background: #444; padding: 4px; border-radius: 5px;
        }
        .cell { 
            aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; 
            background: #fff; color: #000; font-weight: 900; font-size: 1.1rem; /* LETRAS GRANDES */
        }
        .sel { background: #ffeb3b !important; }
        .found { background: #4caf50 !important; color: white !important; }
        #word-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; margin: 15px; padding: 10px; background: #333; border-radius: 10px; width: 90vw; }
        .word-item { padding: 5px 10px; background: #444; border-radius: 5px; font-size: 0.8rem; border: 1px solid #666; }
        .word-found { background: #1b5e20; color: #fff; text-decoration: line-through; opacity: 0.6; }
        .btn-win { display: none; background: #25D366; color: white; padding: 15px 30px; border-radius: 30px; text-decoration: none; font-weight: bold; margin-bottom: 30px; font-size: 1.2rem; animation: pulse 1s infinite; }
        @keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.05);} 100% {transform: scale(1);} }
    </style>
</head>
<body>
    <h3>📖 LIBRERÍA LOGOS</h3>
    <div id="grid"></div>
    <div id="word-list"><span class="word-item" id="w-CATEDRAL">CATEDRAL</span><span class="word-item" id="w-PULSERA">PULSERA</span><span class="word-item" id="w-KENNEDY">KENNEDY</span><span class="word-item" id="w-BIBLIA">BIBLIA</span><span class="word-item" id="w-SALMOS">SALMOS</span><span class="word-item" id="w-CRISTO">CRISTO</span><span class="word-item" id="w-LIBROS">LIBROS</span><span class="word-item" id="w-AGENDA">AGENDA</span><span class="word-item" id="w-LOGOS">LOGOS</span><span class="word-item" id="w-CRUZ">CRUZ</span><span class="word-item" id="w-AMEN">AMEN</span><span class="word-item" id="w-DIOS">DIOS</span><span class="word-item" id="w-AMOR">AMOR</span><span class="word-item" id="w-PAZ">PAZ</span></div>
    <a href="https://wa.me/573125756581?text=¡Gané el reto de 15 palabras!" class="btn-win" id="win-btn">✅ RECLAMAR PREMIO</a>
    <script>
        const words = ["CATEDRAL", "PULSERA", "KENNEDY", "BIBLIA", "SALMOS", "CRISTO", "LIBROS", "AGENDA", "LOGOS", "CRUZ", "AMEN", "DIOS", "AMOR", "PAZ"];
        const matrix = [["A", "G", "C", "A", "T", "E", "D", "R", "A", "L", "Q", "J", "R", "I", "G"], ["M", "B", "O", "N", "H", "L", "O", "H", "E", "C", "I", "O", "Q", "J", "B"], ["E", "C", "F", "Y", "V", "W", "P", "R", "A", "G", "E", "N", "D", "A", "H"], ["N", "K", "N", "D", "W", "Z", "L", "U", "K", "K", "U", "X", "G", "O", "F"], ["O", "M", "M", "E", "Q", "S", "Q", "R", "L", "C", "A", "U", "M", "H", "P"], ["B", "I", "B", "L", "I", "A", "A", "L", "L", "S", "R", "U", "T", "Z", "J"], ["X", "E", "X", "R", "A", "M", "E", "L", "I", "L", "E", "U", "R", "J", "D"], ["Y", "D", "H", "K", "S", "M", "L", "D", "M", "B", "O", "R", "Z", "I", "A"], ["I", "H", "T", "F", "T", "J", "O", "B", "Y", "O", "R", "G", "A", "M", "Y"], ["E", "C", "A", "D", "R", "W", "Q", "R", "B", "T", "S", "O", "O", "I", "T"], ["R", "N", "R", "V", "Q", "D", "G", "H", "C", "P", "S", "N", "S", "S", "V"], ["W", "Y", "H", "I", "S", "K", "E", "N", "N", "E", "D", "Y", "T", "C", "Z"], ["O", "P", "A", "Z", "S", "K", "D", "I", "O", "S", "L", "D", "G", "V", "O"], ["Y", "U", "J", "I", "D", "T", "D", "I", "M", "S", "B", "B", "W", "O", "M"], ["E", "H", "K", "D", "V", "S", "O", "K", "N", "L", "Y", "G", "I", "G", "H"]];
        const grid = document.getElementById('grid');
        let selecting = false, selected = [], foundCount = 0;
        
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSfx(f, type, vol, dur) {
            try {
                const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                o.type = type; o.frequency.setValueAtTime(f, audioCtx.currentTime);
                g.gain.setValueAtTime(vol, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
                o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + dur);
            } catch(e) {}
        }

        matrix.flat().forEach(char => {
            const div = document.createElement('div'); div.className = 'cell'; div.textContent = char; grid.appendChild(div);
        });

        const getCell = (e) => {
            const t = e.touches ? e.touches[0] : e;
            const el = document.elementFromPoint(t.clientX, t.clientY);
            return el && el.classList.contains('cell') ? el : null;
        };

        const start = (e) => { 
            if(audioCtx.state === 'suspended') audioCtx.resume();
            selecting = true; selected = []; move(e); 
        };
        const move = (e) => {
            if(!selecting) return; const el = getCell(e);
            if(el && !selected.includes(el)) { 
                el.classList.add('sel'); selected.push(el); 
                playSfx(300 + (selected.length * 40), 'sine', 0.1, 0.1); 
            }
        };
        const end = () => {
            selecting = false; const word = selected.map(el => el.textContent).join(''); const rev = word.split('').reverse().join('');
            if(words.includes(word) || words.includes(rev)) {
                const val = words.includes(word) ? word : rev;
                selected.forEach(el => el.classList.add('found'));
                const item = document.getElementById('w-' + val);
                if(item && !item.classList.contains('word-found')) { 
                    item.classList.add('word-found'); foundCount++; 
                    playSfx(600, 'square', 0.2, 0.4); // SONIDO DE ÉXITO MÁS FUERTE
                }
                if(foundCount === words.length) document.getElementById('win-btn').style.display = 'block';
            } else { selected.forEach(el => el.classList.remove('sel')); }
        };

        grid.addEventListener('touchstart', e => { e.preventDefault(); start(e); }, {passive:false});
        grid.addEventListener('touchmove', e => { e.preventDefault(); move(e); }, {passive:false});
        window.addEventListener('touchend', end);
        grid.addEventListener('mousedown', start); window.addEventListener('mousemove', move); window.addEventListener('mouseup', end);
    </script>
</body>
</html>
