
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sopa Logos</title>
    <style>
        * { touch-action: none; user-select: none; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: sans-serif; margin: 0; background: #eee; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .header { background: #2e7d32; color: white; padding: 8px; font-weight: bold; display: flex; justify-content: space-between; flex-shrink: 0; z-index: 10; }
        
        /* Contenedor principal de la sopa */
        #game-container { flex: 0 0 auto; width: 100%; display: flex; justify-content: center; padding: 5px; background: #fff; }
        #grid { 
            display: grid; grid-template-columns: repeat(15, 1fr); 
            width: 95vw; max-width: 380px; aspect-ratio: 1/1;
            background: #ccc; gap: 1px; border: 2px solid #2e7d32;
        }
        .cell { background: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 13px; color: #333; }
        .sel { background: #fff176 !important; }
        .found { background: #4caf50 !important; color: white !important; }

        /* LISTA DE PALABRAS (Aquí estaba el error, ahora tiene altura fija y scroll) */
        #word-section { 
            flex: 1; overflow-y: auto; background: #fdfdfd; 
            padding: 10px; border-top: 2px solid #2e7d32;
            touch-action: pan-y; /* Permite deslizar para ver más palabras */
        }
        #word-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; }
        .word-item { 
            padding: 4px 10px; background: #fff; border-radius: 12px; 
            font-size: 11px; border: 1px solid #ddd; color: #555;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .word-found { background: #e8f5e9; color: #2e7d32; text-decoration: line-through; border-color: #2e7d32; opacity: 0.5; }

        #victory-screen { 
            display: none; position: fixed; inset: 0; background: white; 
            z-index: 100; flex-direction: column; align-items: center; justify-content: center; 
        }
        .btn-next { background: #2e7d32; color: white; padding: 15px 40px; border-radius: 30px; border: none; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="header">
        <span>LIBRERÍA LOGOS</span>
        <span id="record-tag">Nivel: 1</span>
    </div>

    <div id="game-container">
        <div id="grid"></div>
    </div>

    <div id="word-section">
        <div style="font-size: 10px; color: #888; margin-bottom: 5px; text-align: center;">BUSCA ESTAS PALABRAS (DESLIZA ABAJO):</div>
        <div id="word-list"></div>
    </div>

    <div id="victory-screen">
        <h2 style="color: #2e7d32;">¡EXCELENTE!</h2>
        <p>Nivel superado.</p>
        <div style="padding: 15px; border: 1px dashed #2e7d32; border-radius: 8px; text-align: center; margin: 10px;">
            <small>Publicidad:</small><br><b>Mugs y Botilitos personalizados</b><br>Kennedy Central - Bogotá
        </div>
        <button class="btn-next" onclick="initGame()">SIGUIENTE NIVEL</button>
    </div>

    <script>
        const pool = [];
        let usedWords = JSON.parse(localStorage.getItem('logos_used')) || [];
        let wordsPos = {}; let foundCount = 0; let activeCoords = []; let isSelecting = false;
        const TAMANO = 15;

        let audioCtx = null;
        function playTone(f, d) {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                o.frequency.setValueAtTime(f, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
                o.connect(g); g.connect(audioCtx.destination);
                o.start(); o.stop(audioCtx.currentTime + d);
            } catch(e){}
        }

        function initGame() {
            document.getElementById('victory-screen').style.display = 'none';
            document.getElementById('grid').innerHTML = '';
            document.getElementById('word-list').innerHTML = '';
            wordsPos = {}; foundCount = 0;
            
            let level = parseInt(localStorage.getItem('logos_level')) || 1;
            document.getElementById('record-tag').textContent = "Nivel: " + level;

            let available = pool.filter(w => !usedWords.includes(w));
            if (available.length < 12) { usedWords = []; available = pool; }
            const seleccionadas = available.sort(() => 0.5 - Math.random()).slice(0, 12);
            usedWords.push(...seleccionadas);
            localStorage.setItem('logos_used', JSON.stringify(usedWords.slice(-200)));

            let matriz = Array(TAMANO).fill().map(() => Array(TAMANO).fill(''));
            seleccionadas.forEach(palabra => {
                let colocada = false;
                for(let i=0; i<40; i++) {
                    if(colocada) break;
                    let dir = ['H','V','D'][Math.floor(Math.random()*3)];
                    let f = Math.floor(Math.random()*(TAMANO - (dir!=='H'?palabra.length:0)));
                    let c = Math.floor(Math.random()*(TAMANO - (dir!=='V'?palabra.length:0)));
                    let coords = []; let puede = true;
                    for(let j=0; j<palabra.length; j++) {
                        let nf = f + (dir==='V' || dir==='D' ? j : 0);
                        let nc = c + (dir==='H' || dir==='D' ? j : 0);
                        if(nf>=TAMANO || nc>=TAMANO || (matriz[nf][nc] !== '' && matriz[nf][nc] !== palabra[j])) { puede = false; break; }
                        coords.push(nf + '-' + nc);
                    }
                    if(puede) {
                        coords.forEach((co, idx) => { matriz[co.split('-')[0]][co.split('-')[1]] = palabra[idx]; });
                        wordsPos[palabra] = coords; colocada = true;
                    }
                }
            });

            const gridDiv = document.getElementById('grid');
            matriz.forEach((fila, r) => fila.forEach((char, c) => {
                const cell = document.createElement('div');
                cell.className = 'cell'; cell.textContent = char || String.fromCharCode(65 + Math.floor(Math.random()*26));
                cell.dataset.pos = r + '-' + c;
                gridDiv.appendChild(cell);
            }));

            const listDiv = document.getElementById('word-list');
            Object.keys(wordsPos).forEach(w => {
                const span = document.createElement('span');
                span.className = 'word-item'; span.id = 'w-' + w; span.textContent = w;
                listDiv.appendChild(span);
            });
        }

        function handleMove(e) {
            if (!isSelecting) return;
            const t = e.touches ? e.touches[0] : e;
            const el = document.elementFromPoint(t.clientX, t.clientY);
            if (el && el.classList.contains('cell')) {
                const pos = el.dataset.pos;
                if (!activeCoords.includes(pos)) {
                    activeCoords.push(pos); el.classList.add('sel');
                    playTone(440, 0.05); checkWin();
                }
            }
        }

        const grid = document.getElementById('grid');
        grid.addEventListener('touchstart', (e) => { isSelecting = true; activeCoords = []; handleMove(e); e.preventDefault(); }, {passive:false});
        grid.addEventListener('touchmove', (e) => { handleMove(e); e.preventDefault(); }, {passive:false});
        window.addEventListener('touchend', () => {
            isSelecting = false;
            document.querySelectorAll('.sel').forEach(c => c.classList.remove('sel'));
        });

        function checkWin() {
            for (let word in wordsPos) {
                if (wordsPos[word].every(p => document.querySelector(`[data-pos="${p}"]`).classList.contains('sel') || document.querySelector(`[data-pos="${p}"]`).classList.contains('found'))) {
                    wordsPos[word].forEach(p => document.querySelector(`[data-pos="${p}"]`).classList.add('found'));
                    const item = document.getElementById('w-' + word);
                    if (item && !item.classList.contains('word-found')) {
                        item.classList.add('word-found'); foundCount++; playTone(660, 0.1);
                        if (foundCount === Object.keys(wordsPos).length) {
                            localStorage.setItem('logos_level', (parseInt(localStorage.getItem('logos_level')) || 1) + 1);
                            setTimeout(() => document.getElementById('victory-screen').style.display = 'flex', 500);
                        }
                    }
                }
            }
        }
        initGame();
    </script>
</body>
</html>
